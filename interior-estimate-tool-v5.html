<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>서진인테리어 견적 산출 툴 v5</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=Noto+Serif+KR:wght@400;600;700&display=swap');

/* ══════════════════════════════════════
   디자인 토큰
══════════════════════════════════════ */
:root {
  --c-bg:       #F4F3EF;
  --c-surface:  #FFFFFF;
  --c-surface2: #FAFAF7;
  --c-border:   #E4E1D9;
  --c-border2:  #D0CCС4;
  --c-text:     #1C1C1E;
  --c-muted:    #78787C;
  --c-muted2:   #AEAEB2;

  --c-gold:     #B8933A;
  --c-gold-lt:  #F5EDD6;
  --c-gold-dk:  #8C6E2B;

  --c-navy:     #1A2035;
  --c-navy2:    #253050;
  --c-navy-lt:  #E8EAF0;

  --c-danger:   #C0392B;
  --c-danger-lt:#FDECEA;
  --c-success:  #1E7E4B;
  --c-success-lt:#E9F7EF;
  --c-info:     #1A5F9E;
  --c-info-lt:  #EAF2FB;
  --c-warn:     #D4820A;
  --c-warn-lt:  #FEF3E2;

  --r-sm: 4px;
  --r-md: 8px;
  --r-lg: 12px;
  --r-xl: 16px;

  --sh-sm:  0 1px 4px rgba(0,0,0,.06);
  --sh-md:  0 2px 10px rgba(0,0,0,.09);
  --sh-lg:  0 6px 24px rgba(0,0,0,.13);

  --t-fast: .12s;
  --t-mid:  .22s;
}

/* ══════════════════════════════════════
   리셋 & 기본
══════════════════════════════════════ */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family:'Noto Sans KR', sans-serif;
  background:var(--c-bg);
  color:var(--c-text);
  min-height:100vh;
  font-size:13px;
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3 { font-family:'Noto Serif KR', serif; }

/* ══════════════════════════════════════
   TOAST 알림
══════════════════════════════════════ */
.toast-wrap {
  position:fixed; top:68px; right:16px; z-index:9999;
  display:flex; flex-direction:column; gap:8px; pointer-events:none;
}
.toast {
  padding:10px 16px; border-radius:var(--r-md);
  font-size:13px; font-weight:600; color:#fff;
  box-shadow:var(--sh-lg); pointer-events:none;
  animation:toastIn .25s ease, toastOut .3s ease 2.2s forwards;
  display:flex; align-items:center; gap:8px;
  max-width:300px;
}
.toast.success { background:var(--c-success); }
.toast.error   { background:var(--c-danger); }
.toast.info    { background:var(--c-info); }
.toast.warn    { background:var(--c-warn); }
@keyframes toastIn  { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
@keyframes toastOut { to{opacity:0;transform:translateX(20px)} }

/* ══════════════════════════════════════
   상단 네비
══════════════════════════════════════ */
.nav {
  background:var(--c-navy);
  height:56px; padding:0 20px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:500;
  box-shadow:0 2px 12px rgba(0,0,0,.22);
}
.nav-logo {
  font-family:'Noto Serif KR', serif;
  font-size:15px; font-weight:700;
  color:#fff; display:flex; align-items:center; gap:8px;
  letter-spacing:-.3px;
}
.nav-logo-mark {
  width:28px; height:28px; background:var(--c-gold);
  border-radius:6px; display:flex; align-items:center; justify-content:center;
  font-size:14px;
}
.nav-tabs { display:flex; }
.ntab {
  height:56px; padding:0 14px; border:none; background:transparent;
  color:rgba(255,255,255,.55); font-family:inherit; font-size:12px; font-weight:700;
  cursor:pointer; border-bottom:2px solid transparent;
  letter-spacing:.4px; text-transform:uppercase; transition:all var(--t-mid);
}
.ntab:hover { color:rgba(255,255,255,.85); }
.ntab.on { color:#fff; border-bottom-color:var(--c-gold); }
.nav-right { display:flex; gap:6px; align-items:center; }

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
.workspace {
  display:grid;
  grid-template-columns:1fr 340px;
  min-height:calc(100vh - 56px);
  align-items:start;
}
.main-col {
  padding:18px 18px 100px;
  display:flex; flex-direction:column; gap:14px;
}
.side-col {
  background:var(--c-surface);
  border-left:1px solid var(--c-border);
  padding:16px;
  position:sticky; top:56px;
  height:calc(100vh - 56px);
  overflow-y:auto;
  display:flex; flex-direction:column; gap:10px;
}

/* ══════════════════════════════════════
   CARD
══════════════════════════════════════ */
.card {
  background:var(--c-surface);
  border:1px solid var(--c-border);
  border-radius:var(--r-lg);
  box-shadow:var(--sh-sm);
  overflow:hidden;
}
.card-hd {
  padding:11px 15px;
  border-bottom:1px solid var(--c-border);
  display:flex; align-items:center; justify-content:space-between;
  background:var(--c-surface2);
}
.card-hd.clickable { cursor:pointer; user-select:none; }
.card-hd.clickable:hover { background:#F0EFE9; }
.card-label {
  font-size:12px; font-weight:800;
  letter-spacing:.4px;
  color:var(--c-navy); display:flex; align-items:center; gap:7px;
}
.card-label .ico { font-size:16px; }
.card-body { padding:14px 15px; }

/* ══════════════════════════════════════
   FORM
══════════════════════════════════════ */
.fg  { display:flex; flex-direction:column; gap:4px; }
.fg2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.fg3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
.fg.full { grid-column:1/-1; }
.flabel {
  font-size:10px; font-weight:800;
  color:var(--c-muted); text-transform:uppercase; letter-spacing:.7px;
}
.finput {
  padding:8px 10px;
  border:1.5px solid var(--c-border);
  border-radius:var(--r-md);
  font-family:inherit; font-size:13px; color:var(--c-text);
  background:var(--c-surface2);
  transition:border-color var(--t-fast), box-shadow var(--t-fast);
  width:100%;
}
.finput:focus {
  outline:none; border-color:var(--c-gold);
  box-shadow:0 0 0 3px rgba(184,147,58,.12);
  background:#fff;
}
textarea.finput { resize:vertical; min-height:52px; }
input[type=number].finput { -moz-appearance:textfield; }
input[type=number].finput::-webkit-inner-spin-button,
input[type=number].finput::-webkit-outer-spin-button { -webkit-appearance:none; }
.hint { font-size:10px; color:var(--c-danger); margin-top:3px; }

/* ══════════════════════════════════════
   PROJECT GRID
══════════════════════════════════════ */
.proj-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:7px; }
.pjbtn {
  padding:12px 6px 10px;
  border:2px solid var(--c-border);
  border-radius:var(--r-lg);
  background:var(--c-surface);
  cursor:pointer; text-align:center;
  font-family:inherit; font-size:12px; font-weight:700;
  color:var(--c-muted); letter-spacing:.2px;
  transition:all var(--t-fast);
  display:flex; flex-direction:column; align-items:center; gap:5px;
  box-shadow:var(--sh-sm);
}
.pjbtn .e { font-size:24px; line-height:1; }
.pjbtn:hover { border-color:var(--c-gold); color:var(--c-gold-dk); background:var(--c-gold-lt); transform:translateY(-1px); box-shadow:var(--sh-md); }
.pjbtn.on {
  border-color:var(--c-gold); background:var(--c-gold-lt);
  color:var(--c-navy); box-shadow:0 0 0 3px rgba(184,147,58,.2); font-weight:800;
}

/* ══════════════════════════════════════
   OPTION SECTIONS
══════════════════════════════════════ */
.osec {
  border:1px solid var(--c-border);
  border-radius:var(--r-md);
  overflow:hidden; margin-bottom:8px;
}
.osec-hd {
  padding:10px 14px; background:var(--c-surface2);
  font-weight:800; font-size:13px; color:var(--c-navy);
  border-bottom:1px solid var(--c-border);
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; user-select:none; transition:background var(--t-fast);
}
.osec-hd:hover { background:#EEECEA; }
.osec-body { padding:12px 13px; display:flex; flex-direction:column; gap:9px; }

.orow { display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; }
.olbl { font-size:12px; color:var(--c-text); min-width:75px; }

/* ══════════════════════════════════════
   TOGGLE BUTTONS
══════════════════════════════════════ */
.tg-wrap { display:flex; gap:4px; flex-wrap:wrap; flex:1; justify-content:flex-end; }
.tg {
  padding:4px 10px;
  border:1.5px solid var(--c-border);
  border-radius:var(--r-sm);
  background:var(--c-surface2);
  cursor:pointer; font-family:inherit;
  font-size:11px; font-weight:700; color:var(--c-muted);
  transition:all var(--t-fast); white-space:nowrap;
}
.tg:hover { border-color:var(--c-gold); color:var(--c-gold-dk); }
.tg.on { border-color:var(--c-gold); background:var(--c-gold); color:#fff; }
.tg.on:hover { background:var(--c-gold-dk); }

/* CHECKBOX */
.cbox { display:flex; align-items:center; gap:8px; cursor:pointer; }
.cbox input[type=checkbox] { width:15px; height:15px; accent-color:var(--c-gold); flex-shrink:0; }
.cbox span { font-size:12px; color:var(--c-text); }

/* ══════════════════════════════════════
   BATHROOM TABS
══════════════════════════════════════ */
.bath-tabs { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:10px; align-items:center; }
.btab {
  padding:5px 12px; border:1.5px solid var(--c-border);
  border-radius:99px; background:var(--c-surface2);
  cursor:pointer; font-family:inherit;
  font-size:11px; font-weight:700; color:var(--c-muted);
  transition:all var(--t-fast); display:flex; align-items:center; gap:5px;
}
.btab:hover { border-color:var(--c-gold); color:var(--c-gold-dk); }
.btab.on { border-color:var(--c-gold); background:var(--c-gold); color:#fff; }
.btab .x { font-size:9px; opacity:.75; }
.btab .x:hover { opacity:1; }
.bath-add {
  padding:5px 11px; border:1.5px dashed var(--c-border);
  border-radius:99px; background:transparent;
  cursor:pointer; font-family:inherit;
  font-size:11px; font-weight:700; color:var(--c-muted);
  transition:all var(--t-fast);
}
.bath-add:hover { border-color:var(--c-gold); color:var(--c-gold); }

/* ══════════════════════════════════════
   SUBTOTAL
══════════════════════════════════════ */
.sub-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:7px 0; border-top:1px dashed var(--c-border); margin-top:4px;
}
.sub-lbl { font-size:11px; color:var(--c-muted); font-weight:700; }
.sub-amt { font-size:15px; font-weight:800; color:var(--c-navy); }

/* ══════════════════════════════════════
   BUTTONS
══════════════════════════════════════ */
.btn {
  padding:8px 14px; border-radius:var(--r-md);
  border:none; cursor:pointer; font-family:inherit;
  font-size:12px; font-weight:700;
  transition:all var(--t-fast);
  display:inline-flex; align-items:center; justify-content:center; gap:5px;
  white-space:nowrap;
}
.btn-gold   { background:var(--c-gold); color:#fff; }
.btn-gold:hover { background:var(--c-gold-dk); }
.btn-navy   { background:var(--c-navy); color:#fff; }
.btn-navy:hover { background:var(--c-navy2); }
.btn-ghost  { background:transparent; color:rgba(255,255,255,.7); border:1px solid rgba(255,255,255,.25); }
.btn-ghost:hover { background:rgba(255,255,255,.1); color:#fff; }
.btn-outline { background:transparent; color:var(--c-navy); border:1.5px solid var(--c-border); }
.btn-outline:hover { border-color:var(--c-navy); }
.btn-danger { background:var(--c-danger-lt); color:var(--c-danger); border:1.5px solid #f5c6c2; }
.btn-danger:hover { background:var(--c-danger); color:#fff; }
.btn-success { background:var(--c-success-lt); color:var(--c-success); border:1.5px solid #a9dfbf; }
.btn-success:hover { background:var(--c-success); color:#fff; }
.btn-kakao { background:#FEE500; color:#3C1E1E; }
.btn-kakao:hover { background:#f0d800; }
.btn-sm { padding:4px 10px; font-size:11px; border-radius:var(--r-sm); }
.btn-full { width:100%; }
.btn:disabled { opacity:.5; cursor:not-allowed; }

/* ══════════════════════════════════════
   SIDE SUMMARY
══════════════════════════════════════ */
.sum-ttl {
  font-size:10px; font-weight:800; text-transform:uppercase;
  letter-spacing:.9px; color:var(--c-navy);
  border-bottom:2px solid var(--c-gold); padding-bottom:7px;
}
.sum-item {
  display:flex; justify-content:space-between; align-items:center;
  padding:5px 0; border-bottom:1px solid #F0EDE6; font-size:12px;
}
.sum-item:last-child { border-bottom:none; }
.sim-name { color:var(--c-text); display:flex; align-items:center; gap:4px; }
.sim-amt  { font-weight:700; color:var(--c-navy); }
.sum-empty { color:var(--c-muted2); font-size:11px; text-align:center; padding:16px 0; }

.total-box {
  background:var(--c-navy);
  border-radius:var(--r-lg); padding:14px 15px; margin-top:4px;
}
.tlbl { font-size:10px; color:rgba(255,255,255,.5); text-transform:uppercase; letter-spacing:.8px; }
.tamt { font-size:22px; font-weight:800; color:var(--c-gold); margin-top:2px; }
.tsub { font-size:10px; color:rgba(255,255,255,.4); margin-top:3px; display:flex; flex-direction:column; gap:1px; }

.adj-row { display:flex; align-items:center; gap:7px; }
.adj-row .flabel { min-width:58px; }
.adj-row .finput { flex:1; text-align:right; }
.adj-row .unit   { font-size:11px; color:var(--c-muted); min-width:20px; }

/* VAT 박스 */
.vat-box {
  background:var(--c-info-lt); border:1px solid #C5DBF0;
  border-radius:var(--r-md); padding:10px 12px;
  display:flex; flex-direction:column; gap:5px;
}
.vat-row { display:flex; justify-content:space-between; font-size:11px; color:var(--c-info); }
.vat-row.total { font-weight:800; font-size:13px; }

/* 분할 결제 */
.pay-box {
  background:var(--c-gold-lt); border:1px solid #DEC97A;
  border-radius:var(--r-md); padding:10px 12px;
  display:flex; flex-direction:column; gap:5px;
}
.pay-row { display:flex; justify-content:space-between; align-items:center; font-size:11px; }
.pay-label { color:var(--c-gold-dk); font-weight:700; }
.pay-amt   { font-weight:800; color:var(--c-navy); }

/* ══════════════════════════════════════
   BADGES / TAGS
══════════════════════════════════════ */
.badge {
  display:inline-block; padding:2px 7px; border-radius:99px;
  font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:.5px;
}
.badge-gold    { background:var(--c-gold-lt); color:var(--c-gold-dk); }
.badge-navy    { background:var(--c-navy); color:#fff; }
.badge-success { background:var(--c-success-lt); color:var(--c-success); }
.badge-warn    { background:var(--c-warn-lt); color:var(--c-warn); }
.badge-ver     { background:var(--c-navy-lt); color:var(--c-navy); }
.tag {
  display:inline-flex; align-items:center; gap:3px;
  padding:2px 7px; background:var(--c-gold-lt); color:var(--c-gold-dk);
  border-radius:99px; font-size:10px; font-weight:700;
}
.divider { height:1px; background:var(--c-border); margin:4px 0; }
.sec-head { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.8px; color:var(--c-muted); margin-bottom:6px; }

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
.overlay {
  position:fixed; inset:0; background:rgba(10,10,20,.55);
  z-index:600; display:flex; align-items:center; justify-content:center;
  padding:16px; backdrop-filter:blur(3px);
}
.modal {
  background:var(--c-surface); border-radius:var(--r-xl);
  box-shadow:var(--sh-lg); width:100%; max-width:700px;
  max-height:92vh; overflow-y:auto;
  animation:modalIn .2s ease;
}
.modal-sm { max-width:480px; }
.modal-hd {
  padding:14px 18px; border-bottom:1px solid var(--c-border);
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; background:var(--c-surface); z-index:1;
}
.modal-ttl { font-family:'Noto Serif KR',serif; font-size:15px; font-weight:700; color:var(--c-navy); }
.modal-body { padding:18px; }
.modal-ft {
  padding:12px 18px; border-top:1px solid var(--c-border);
  display:flex; gap:8px; justify-content:flex-end;
  position:sticky; bottom:0; background:var(--c-surface);
}
@keyframes modalIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ══════════════════════════════════════
   저장 목록 / 검색
══════════════════════════════════════ */
.search-bar {
  display:flex; gap:8px; align-items:center; margin-bottom:12px;
}
.search-bar .finput { flex:1; }
.saved-list { display:flex; flex-direction:column; gap:7px; }
.sitem {
  padding:11px 13px; border:1px solid var(--c-border);
  border-radius:var(--r-md); background:var(--c-surface);
  cursor:pointer; transition:all var(--t-fast);
  display:flex; align-items:center; gap:10px;
}
.sitem:hover { border-color:var(--c-gold); box-shadow:var(--sh-md); }
.sitem-info { flex:1; min-width:0; }
.sitem-name { font-size:13px; font-weight:700; color:var(--c-navy); }
.sitem-meta { font-size:10px; color:var(--c-muted); margin-top:2px; }
.sitem-amt  { font-size:13px; font-weight:800; color:var(--c-gold); white-space:nowrap; }
.ver-badge  {
  display:inline-block; padding:1px 6px;
  background:var(--c-navy-lt); color:var(--c-navy);
  border-radius:3px; font-size:9px; font-weight:800;
  margin-left:5px;
}

/* ══════════════════════════════════════
   TEMPLATE CARDS
══════════════════════════════════════ */
.tmpl-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
.tmpl-card {
  border:1.5px solid var(--c-border); border-radius:var(--r-md);
  padding:13px; cursor:pointer; transition:all var(--t-fast);
  background:var(--c-surface2);
}
.tmpl-card:hover { border-color:var(--c-gold); background:var(--c-gold-lt); box-shadow:var(--sh-md); }
.tmpl-card.dash {
  border-style:dashed; display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:5px; min-height:80px;
}
.tmpl-name { font-size:13px; font-weight:700; color:var(--c-navy); margin-bottom:4px; }
.tmpl-desc { font-size:11px; color:var(--c-muted); line-height:1.5; }

/* ══════════════════════════════════════
   PRINT PREVIEW
══════════════════════════════════════ */
#print-root { background:#fff; font-family:'Noto Sans KR',sans-serif; }
.pr-wrap { max-width:680px; margin:0 auto; padding:32px 36px; }

/* 헤더 */
.pr-hd {
  display:flex; align-items:flex-start; justify-content:space-between;
  border-bottom:3px solid var(--c-navy); padding-bottom:16px; margin-bottom:20px;
}
.pr-co-logo {
  width:44px; height:44px; background:var(--c-navy);
  border-radius:8px; display:flex; align-items:center; justify-content:center;
  font-size:22px; margin-bottom:8px;
}
.pr-co-name { font-family:'Noto Serif KR',serif; font-size:18px; font-weight:700; color:var(--c-navy); }
.pr-co-info { font-size:10px; color:var(--c-muted); margin-top:2px; line-height:1.6; }
.pr-doc-area { text-align:right; }
.pr-doc-ttl  { font-family:'Noto Serif KR',serif; font-size:24px; font-weight:700; color:var(--c-navy); letter-spacing:-.5px; }
.pr-doc-id   { font-size:10px; color:var(--c-muted); margin-top:4px; }
.pr-doc-date { font-size:12px; color:var(--c-navy); font-weight:600; margin-top:2px; }

/* 고객 정보 박스 */
.pr-info {
  background:#F8F7F4; border:1px solid var(--c-border);
  border-radius:var(--r-md); padding:14px 16px; margin-bottom:18px;
  display:grid; grid-template-columns:1fr 1fr; gap:7px 20px;
}
.pr-info-item { display:flex; gap:8px; font-size:12px; }

/* 항목 테이블 */

.pr-tbl thead th {

  padding:8px 11px; font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:.5px; text-align:left;
}
.pr-tbl thead th:last-child { text-align:right; }
.pr-tbl tbody td { padding:9px 11px; border-bottom:1px solid var(--c-border); font-size:12px; }
.pr-tbl tbody td:last-child { text-align:right; font-weight:700; color:var(--c-navy); }
.pr-tbl tbody tr:last-child td { border-bottom:none; }
.pr-tbl tbody tr:nth-child(even) { background:#FAFAF7; }
.pr-detail { font-size:10px; color:var(--c-muted); line-height:1.6; white-space:pre-line; }

/* 합계 영역 */
.pr-total {
  border:2px solid var(--c-navy); border-radius:var(--r-md);

}
.pr-total-hd {
  background:var(--c-navy); color:#fff; padding:7px 14px;

}
.pr-total-body { padding:12px 14px; display:flex; flex-direction:column; gap:5px; }
.pr-trow { display:flex; justify-content:space-between; font-size:12px; padding:3px 0; }
.pr-trow.sep { border-top:1px solid var(--c-border); margin-top:5px; padding-top:8px; }
.pr-trow.final { font-size:18px; font-weight:800; color:var(--c-navy); margin-top:6px; border-top:1.5px solid var(--c-navy); padding-top:9px; }
.pr-trow.final span:last-child { color:var(--c-gold-dk); }

/* 결제 일정 */
.pr-pay {
  background:var(--c-gold-lt); border:1px solid #DEC97A;
  border-radius:var(--r-md); padding:12px 14px; margin-bottom:14px;
}
.pr-pay-ttl { font-size:11px; font-weight:800; color:var(--c-gold-dk); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }

.pr-pay-item { text-align:center; }
.pr-pay-item .lbl { font-size:10px; color:var(--c-gold-dk); font-weight:600; }
.pr-pay-item .amt { font-size:13px; font-weight:800; color:var(--c-navy); margin-top:2px; }

/* 안내문 */
.pr-note {
  background:#F8F7F4; border-left:3px solid var(--c-gold);

}

}

══════════════════════════════════════ */
.dash-page { padding:18px; display:flex; flex-direction:column; gap:14px; }

}
.sl { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.6px; color:var(--c-muted); }

.bt  { flex:1; background:#F0EDE6; border-radius:99px; height:18px; overflow:hidden; }
.bf  { height:100%; background:var(--c-gold); border-radius:99px; display:flex; align-items:center; padding-left:7px; transition:width .5s; }
.bf  span { font-size:9px; font-weight:800; color:var(--c-navy); }
.bc  { font-size:11px; color:var(--c-muted); min-width:28px; text-align:right; }
.rec-tbl { width:100%; border-collapse:collapse; }
.rec-tbl th { background:var(--c-surface2); padding:7px 10px; font-size:10px; font-weight:800; text-align:left; color:var(--c-muted); border-bottom:1px solid var(--c-border); text-transform:uppercase; letter-spacing:.4px; }
.rec-tbl td { padding:8px 10px; font-size:12px; border-bottom:1px solid #F5F2EB; }
.rec-tbl tr:last-child td { border-bottom:none; }

/* ══════════════════════════════════════
   모바일 하단 고정 바
══════════════════════════════════════ */
.mob-bar {
  display:none;
  position:fixed; bottom:0; left:0; right:0;
  background:var(--c-navy); padding:10px 16px 14px;
  z-index:400; box-shadow:0 -4px 16px rgba(0,0,0,.2);
  align-items:center; gap:10px;
}

.mob-bar-val { font-size:18px; font-weight:800; color:var(--c-gold); }
.mob-bar-btns { display:flex; gap:6px; }

/* ══════════════════════════════════════
   PRINT
══════════════════════════════════════ */
@media print {
  .no-print { display:none !important; }
  body { background:#fff !important; }

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useMemo,useEffect,useRef,useCallback}=React;
const R=React.createElement;

/* ══════════════════ 가격 데이터 ══════════════════ */
const P={
  bathroom:{
    base:2500000,
    demolition:350000,
    waterproof:280000,
    /* 타일 벽 규격 (평당 추가금액) */
    tileWall:{ceramic_300x600:0, porcelain_600x600:350000, porcelain_600x1200:780000},
    /* 타일 바닥 규격 (평당 추가금액) */
    tileFloor:{nonslip_300x300:0, porcelain_600x600:280000},
    /* 줄눈 */
    grout:{cement:0, epoxy:120000},
    /* 환풍기 */
    ventFan:{none:0, basic:120000, silent:220000},
    /* 샤워가림막 */
    showerBooth:{none:0, partition:280000, booth:620000},
    /* 액세서리 세트 */
    accessoriesPack:{basic:0, premium:180000},
    /* 기존 호환 유지 */
    tile:{basic:0,premium:350000,large:650000},
    sink:{basic:0,integrated:280000,premium:520000},
    faucet:{basic:0,premium:220000},
    zendae:190000,mirrorCabinet:230000,
    ceiling:{basic:0,premium:280000},
  },
  kitchen:{base:1200000,sinkReplace:850000,
    countertop:{basic:0,artificial_marble:380000,ceramic:720000,natural_marble:1200000},
    doorReplace:420000,tileWork:380000,hoodReplace:280000,faucetReplace:150000,dishwasher:350000},
  wallpaper:{perPyeong:{basic:28000,silk:45000,premium:72000}},
  flooring:{
    perPyeong:{
      vinyl_sheet:32000,vinyl_tile:45000,SPC:55000,LPM합판마루:48000,
      강마루:68000,원목마루:120000,헤링본마루:145000,타일:85000,
    },
    demolition:15000,baseboard:8000,levelWork:25000,
  },
  grout_work:{perSqm:{cement:8000,epoxy:22000,nano:35000}},
  middoor:{type:{three_fold:0,slim_three_fold:150000,one_slide:80000,swing:-100000,pocket:200000},
    grade:{basic:980000,mid:1380000,premium:1980000}},
  lighting:{fullReplace:380000,downlight:45000,mainLight:85000,ledBar:35000,indirect:220000,pendantLight:130000,spotLight:55000,switchReplace:18000},
  film:{door:65000,doorframe:35000,window:48000,closet:55000},
  builtin_closet:{perMeter:{basic:380000,mid:520000,premium:720000}},
  /* ── 신규 공종 ── */
  window_sash:{
    /* 창호 유형별 단가 (창 1개 기준) */
    type:{pvc:0, aluminum:180000, system:380000},
    /* 창호 등급 */
    grade:{basic:650000, mid:950000, premium:1450000},
    /* 방풍/단열 추가 */
    insulation:220000,
    /* 철거 포함 */
    demolition:150000,
  },
  balcony_extension:{
    /* 베란다 확장 기본 (1개소) */
    base:3200000,
    /* 단열재 등급 */
    insulation:{basic:0, premium:580000},
    /* 바닥 마감 */
    floor:{tile:0, wood:320000},
    /* 샷시 교체 포함 */
    sashIncluded:1200000,
    /* 추가 확장 (㎡당) */
    perSqm:280000,
  },
  demolition_disposal:{
    scope:{bathroom:650000,kitchen:480000,full_pyeong:150000,wallOnly:80000,floorOnly:25000},
    wastePerTon:180000,
  },
  electrical_network:{
    /* 전기 기본 패키지 */
    electricBase:{none:0, basic:850000, full:1800000},
    /* 통신 (인터넷/TV) */
    network:{none:0, basic:350000, premium:680000},
    /* 분전반 교체 */
    panel:450000,
    /* 콘센트 추가 (개당) */
    outletPer:35000,
    /* EV 충전 콘센트 */
    evCharger:320000,
  },
};

/* ══════════════════ 유틸 ══════════════════ */
const fmt=n=>Math.max(0,Math.round(n||0)).toLocaleString('ko-KR')+'원';
const fmtN=n=>Math.max(0,Math.round(n||0)).toLocaleString('ko-KR');
const pn=v=>Math.max(0,parseFloat(v)||0);
const genId=()=>'EST-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).substr(2,4).toUpperCase();
const todayStr=()=>new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'});

/* ══════════════════ 계산 로직 ══════════════════ */

/* ── 욕실 하위 계산 함수 ── */
const calcBathTile=o=>{
  const wall=P.bathroom.tileWall[o.tileWallSpec||'ceramic_300x600']||0;
  const floor=P.bathroom.tileFloor[o.tileFloorSpec||'nonslip_300x300']||0;
  return wall+floor;
};
/* 줄눈은 별도 공종으로 분리 */
const calcGrout=o=>{
  if(!o)return 0;
  const sqm=parseFloat(o.sqm)||0;
  const rate={cement:8000,epoxy:22000,nano:35000}[o.type||'cement']||0;
  return sqm*rate+parseFloat(o.extra||0);
};
const calcBathFixture=o=>{
  let t=0;
  t+=P.bathroom.sink[o.sink||'basic']||0;
  t+=P.bathroom.faucet[o.faucet||'basic']||0;
  if(o.zendae)t+=P.bathroom.zendae;
  if(o.mirrorCabinet)t+=P.bathroom.mirrorCabinet;
  return t;
};
const calcBathAccessory=o=>{
  let t=0;
  t+=P.bathroom.ventFan[o.ventFan||'none']||0;
  t+=P.bathroom.showerBooth[o.showerBooth||'none']||0;
  t+=P.bathroom.accessoriesPack[o.accessoriesPack||'basic']||0;
  t+=P.bathroom.ceiling[o.ceiling||'basic']||0;
  return t;
};
const calcBath=o=>{
  if(!o)return 0;
  let t=P.bathroom.base;
  if(o.demolition)t+=P.bathroom.demolition;
  if(o.waterproof)t+=P.bathroom.waterproof;
  t+=calcBathTile(o);
  t+=calcBathFixture(o);
  t+=calcBathAccessory(o);
  return t+pn(o.extra);
};

/* ── 기존 공종 계산 ── */
const calcKit=o=>{
  let t=P.kitchen.base;
  if(o.sinkReplace)t+=P.kitchen.sinkReplace;
  t+=P.kitchen.countertop[o.countertop||'basic']||0;
  if(o.doorReplace)t+=P.kitchen.doorReplace;
  if(o.tileWork)t+=P.kitchen.tileWork;
  if(o.hoodReplace)t+=P.kitchen.hoodReplace;
  if(o.faucetReplace)t+=P.kitchen.faucetReplace;
  if(o.dishwasher)t+=P.kitchen.dishwasher||350000;
  return t+pn(o.extra);
};
const calcWall=(o,py)=>{
  if(!py)return 0;
  let p=pn(py);if(o.partial)p*=.5;if(o.ceiling)p*=1.3;
  return p*(P.wallpaper.perPyeong[o.type||'basic']||0)+pn(o.extra);
};
const calcFloor=(o,py)=>{
  if(!py)return 0;
  const p=pn(py),rate=P.flooring.perPyeong[o.type||'강마루']||0;
  let t=p*rate;
  if(o.demolition)t+=p*(P.flooring.demolition||15000);
  if(o.baseboard)t+=p*(P.flooring.baseboard||8000);
  if(o.levelWork)t+=p*(P.flooring.levelWork||25000);
  return t+pn(o.extra);
};
const calcDoor=o=>Math.max(0,(P.middoor.grade[o.grade||'basic']||0)+(P.middoor.type[o.type||'three_fold']||0)+pn(o.extra));
const calcLight=o=>{
  let t=0;
  if(o.fullReplace)t+=P.lighting.fullReplace;
  t+=pn(o.downlightQty)*P.lighting.downlight;
  t+=pn(o.mainLightQty)*P.lighting.mainLight;
  t+=pn(o.ledBarQty||0)*P.lighting.ledBar;
  if(o.indirect)t+=P.lighting.indirect;
  t+=pn(o.pendantQty||0)*P.lighting.pendantLight;
  t+=pn(o.spotQty||0)*P.lighting.spotLight;
  t+=pn(o.switchQty||0)*P.lighting.switchReplace;
  return t+pn(o.extra);
};
const calcFilm=o=>pn(o.doorQty)*P.film.door+pn(o.doorframeQty)*P.film.doorframe+pn(o.windowQty)*P.film.window+pn(o.closetQty)*P.film.closet+pn(o.extra);
const calcCloset=o=>pn(o.length)*(P.builtin_closet.perMeter[o.grade||'basic']||0)+pn(o.extra);
const calcOthers=arr=>(arr||[]).reduce((s,o)=>s+pn(o.amount),0);

/* ── 신규 공종 계산 함수 ── */
const calcWindowSash=o=>{
  if(!o)return 0;
  const qty=pn(o.qty)||1;
  let t=(P.window_sash.grade[o.grade||'basic']||0)*qty;
  t+=P.window_sash.type[o.type||'pvc']||0;
  if(o.insulation)t+=P.window_sash.insulation*qty;
  if(o.demolition)t+=P.window_sash.demolition*qty;
  return t+pn(o.extra);
};
const calcBalconyExt=o=>{
  if(!o)return 0;
  let t=P.balcony_extension.base*(pn(o.count)||1);
  t+=P.balcony_extension.insulation[o.insulation||'basic']||0;
  t+=P.balcony_extension.floor[o.floor||'tile']||0;
  if(o.sashIncluded)t+=P.balcony_extension.sashIncluded;
  t+=pn(o.extraSqm)*P.balcony_extension.perSqm;
  return t+pn(o.extra);
};
const calcDemolition=(o,py)=>{
  if(!o)return 0;
  let t=0;
  if(o.bathScope)t+=P.demolition_disposal.scope.bathroom*pn(o.bathCount||1);
  if(o.kitchenScope)t+=P.demolition_disposal.scope.kitchen;
  const p=pn(py)||0;
  if(o.fullScope)t+=p*P.demolition_disposal.scope.full_pyeong;
  if(o.wallScope)t+=p*P.demolition_disposal.scope.wallOnly;
  if(o.floorScope)t+=p*P.demolition_disposal.scope.floorOnly;
  t+=pn(o.wasteTon)*P.demolition_disposal.wastePerTon;
  return t+pn(o.extra);
};
const calcElectrical=o=>{
  if(!o)return 0;
  let t=P.electrical_network.electricBase[o.electricBase||'none']||0;
  t+=P.electrical_network.network[o.network||'none']||0;
  if(o.panel)t+=P.electrical_network.panel;
  t+=pn(o.outletQty)*P.electrical_network.outletPer;
  if(o.evCharger)t+=P.electrical_network.evCharger;
  return t+pn(o.extra);
};

/* ══════════════════ 초기값 ══════════════════ */
const IB={
  demolition:false,waterproof:false,
  /* v4 타일 규격 */
  tileWallSpec:'ceramic_300x600',tileFloorSpec:'nonslip_300x300',groutSpec:'cement',
  /* v4 설비 */
  ventFan:'none',showerBooth:'none',accessoriesPack:'basic',
  /* 기존 유지 */
  sink:'basic',faucet:'basic',zendae:false,mirrorCabinet:false,ceiling:'basic',extra:''
};
const IO={
  bathrooms:[{id:'common1',label:'공용욕실',opt:{...IB}},{id:'master',label:'안방욕실',opt:{...IB}}],
  kitchen:{sinkReplace:false,countertop:'basic',doorReplace:false,tileWork:false,hoodReplace:false,faucetReplace:false,dishwasher:false,extra:''},
  wallpaper:{type:'basic',partial:false,ceiling:false,extra:''},
  flooring:{type:'강마루',demolition:false,baseboard:false,levelWork:false,extra:''},
  middoor:{type:'three_fold',grade:'basic',extra:''},
  lighting:{fullReplace:false,downlightQty:'',mainLightQty:'',ledBarQty:'',indirect:false,pendantQty:'',spotQty:'',switchQty:'',extra:''},
  film:{doorQty:'',doorframeQty:'',windowQty:'',closetQty:'',extra:''},
  builtin_closet:{grade:'basic',length:'',extra:''},
  grout:{type:'cement',sqm:'',extra:''},
  others:[],
  /* v4 신규 공종 초기값 */
  window_sash:{type:'pvc',grade:'basic',qty:'1',insulation:false,demolition:false,extra:''},
  balcony_extension:{count:'1',insulation:'basic',floor:'tile',sashIncluded:false,extraSqm:'',extra:''},
  demolition_disposal:{bathScope:false,bathCount:'1',kitchenScope:false,fullScope:false,wallScope:false,floorScope:false,wasteTon:'2',extra:''},
  electrical_network:{electricBase:'none',network:'none',panel:false,outletQty:'',evCharger:false,extra:''},
};

const REF_ITEMS=[
  {id:'ref_aircon',label:'시스템에어컨',e:'❄️',desc:'별도 업체 시공 (25평 기준 150~400만원대)'},
  {id:'ref_cleaning',label:'입주청소',e:'🧹',desc:'입주 전 필수. 25~33평 30~60만원대'},
  {id:'ref_furniture',label:'가구/가전',e:'🛋️',desc:'소파·침대·냉장고 등 별도 구매 필요'},
  {id:'ref_curtain',label:'커튼/블라인드',e:'🪟',desc:'창문 수량에 따라 별도 의뢰'},
  {id:'ref_wallpad',label:'월패드/스마트홈',e:'📱',desc:'월패드 교체, 도어락, 스마트 스위치 등'},

/* ══════════════════ Toast Hook ══════════════════ */
function useToast(){
  const [toasts,setToasts]=useState([]);
  const add=useCallback((msg,type='info')=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),2600);
  },[]);
  return {toasts,toast:add};
}

/* ══════════════════ 다중 욕실 ══════════════════ */
function BathSection({bathrooms,onChange,open,onToggle}){
  const [tab,setTab]=useState(bathrooms[0]?.id||'master');
  const cur=bathrooms.find(b=>b.id===tab)||bathrooms[0];
  const totalAmt=bathrooms.reduce((s,b)=>s+calcBath(b.opt),0);

  const addBath=()=>{
    if(bathrooms.length>=4){alert('최대 4개까지 추가 가능합니다.');return;}
    const used=bathrooms.map(b=>b.id);
    const next=BATH_OPTS.find(o=>!used.includes(o.id));
    if(!next)return;
    const nl=[...bathrooms,{id:next.id,label:next.label,opt:{...IB}}];
    onChange(nl); setTab(next.id);
  };
  const delBath=(id,e)=>{
    e.stopPropagation();
    if(bathrooms.length<=1){alert('욕실은 최소 1개가 필요합니다.');return;}
    const nl=bathrooms.filter(b=>b.id!==id);
    onChange(nl); if(tab===id)setTab(nl[0].id);
  };
  const updOpt=(id,opt)=>onChange(bathrooms.map(b=>b.id===id?{...b,opt}:b));

  return R('div',{className:'osec'},
    R('div',{className:'osec-hd',onClick:onToggle},
      R('span',{style:{display:'flex',alignItems:'center',gap:8}},
        '🛁 욕실', R('span',{className:'tag'},bathrooms.length+'개')
      ),
      R('span',{style:{fontSize:12,color:'var(--c-muted)'}},open?'▾':'▸')
    ),
    open&&R('div',{style:{padding:'10px 13px'}},
      R('div',{className:'bath-tabs'},
        bathrooms.map(b=>R('button',{key:b.id,className:`btab ${tab===b.id?'on':''}`,onClick:()=>setTab(b.id),type:'button'},
          b.label,
          bathrooms.length>1&&R('span',{className:'x',onClick:e=>delBath(b.id,e)},' ✕')
        )),
        bathrooms.length<4&&R('button',{className:'bath-add',onClick:addBath,type:'button'},'+ 추가')
      ),
      cur&&R(BathOpts,{opt:cur.opt,onChange:opt=>updOpt(cur.id,opt)}),
      bathrooms.length>1&&R('div',{className:'sub-row',style:{borderTop:'2px solid var(--c-gold)',paddingTop:8}},
        R('span',{className:'sub-lbl',style:{color:'var(--c-gold-dk)'}},'욕실 전체'),
        R('span',{className:'sub-amt',style:{color:'var(--c-gold-dk)'}},fmt(totalAmt))
      )
    )
  );
}

/* ══════════════════ 견적서 인쇄 모달 ══════════════════ */
function PrintModal({customer,subtotals,adj,company,mode,vatOn,payRatios,hiddenItems,refSel,refNotes,onClose,toast}){
  const ref=useRef(null);
  const [sharing,setSharing]=useState(false);
  const total=subtotals.reduce((s,i)=>s+i.amount,0);
  const disc=pn(adj.discount), ex=pn(adj.extra), mar=pn(adj.margin);
  const afterDisc=total-disc+ex;
  const finalBase=afterDisc*(1+mar/100);
  const vat=vatOn?finalBase*0.1:0;
  const final=finalBase+vat;
  const isInt=mode==='internal';

  // 고객용에서 숨길 항목 필터
  const visItems=isInt?subtotals:subtotals.filter(i=>!hiddenItems.includes(i.id));

  const handleKakao=async()=>{
    setSharing(true);
    try{
      const el=ref.current;
      const canvas=await html2canvas(el,{scale:2,backgroundColor:'#ffffff',useCORS:true});
      const url=canvas.toDataURL('image/png');
      const link=document.createElement('a');
      link.download=`견적서_${customer.name||'고객'}_${todayStr()}.png`;
      link.href=url; link.click();
      toast('이미지가 저장되었습니다. 카카오톡에서 전송해주세요.','success');
      if(navigator.share){
        canvas.toBlob(async blob=>{
          const file=new File([blob],'견적서.png',{type:'image/png'});
          if(navigator.canShare&&navigator.canShare({files:[file]})){
            try{ await navigator.share({files:[file],title:'인테리어 견적서'}); }catch{}
          }
        });
      }
    }catch{ toast('이미지 생성 실패','error'); }
    setSharing(false);
  };

  // 계약금/중도금/잔금
  const payAmts={
    contract:Math.round(final*(pn(payRatios.contract)/100)),
    middle:Math.round(final*(pn(payRatios.middle)/100)),
    balance:Math.round(final*(pn(payRatios.balance)/100)),
  };

  return R('div',{className:'overlay'},
    R('div',{className:'modal'},
      R('div',{className:'modal-hd no-print'},
        R('span',{className:'modal-ttl'},isInt?'📋 내부용 견적서':'📄 고객용 견적서'),
        R('div',{style:{display:'flex',gap:6}},
          R('button',{className:'btn btn-kakao btn-sm',onClick:handleKakao,disabled:sharing},sharing?'⏳ 생성중...':'💬 카카오톡'),
          R('button',{className:'btn btn-outline btn-sm',onClick:()=>window.print()},'🖨 인쇄'),
          R('button',{className:'btn btn-outline btn-sm',onClick:onClose},'닫기')
        )
      ),

          `벽타일: ${wallLabels[bo.tileWallSpec]||'300×600 도기질'}`,
          `바닥타일: ${floorLabels[bo.tileFloorSpec]||'300×300 논슬립'}`,
          bo.groutSpec==='epoxy'?'줄눈: 에폭시':'줄눈: 시멘트',
          ventLabels[bo.ventFan]||'환풍기 없음',
          boothLabels[bo.showerBooth]||'샤워가림막 없음',
          bo.demolition?'철거 포함':'',bo.waterproof?'방수 포함':'',
        ].filter(Boolean);
        return lines.join('\n');
      }).join('\n─────\n');
      label=`욕실 (${baths.length}개)`;
    } else if(id==='grout'){
      amount=calcGrout(o);
      details=({'cement':'시멘트','epoxy':'에폭시','nano':'나노코팅'}[o.type||'cement'])+' / '+(parseFloat(o.sqm)||0)+'㎡';
      label='줄눈';
    } else if(id==='kitchen'){
      amount=calcKit(o);
      const d=[];
      if(o.sinkReplace)d.push('싱크대 교체');
      if(o.countertop&&o.countertop!=='basic')d.push('상판: '+{artificial_marble:'인조대리석',ceramic:'세라믹'}[o.countertop]);
      if(o.doorReplace)d.push('문짝 교체');if(o.tileWork)d.push('타일 시공');
      if(o.hoodReplace)d.push('후드 교체');if(o.faucetReplace)d.push('수전 교체');
      details=d.join(', ')||'기본 구성';
    } else if(id==='wallpaper'){
      amount=calcWall(o,py);
      details=[{basic:'합지',silk:'실크',premium:'프리미엄'}[o.type]||'합지',o.partial?'부분 도배':'전체 도배',o.ceiling?'천장 포함':''].filter(Boolean).join(' / ');
    } else if(id==='flooring'){
      amount=calcFloor(o,py);
      details=[{linoleum:'장판',hardwood:'강마루',tile:'타일'}[o.type]||'장판',o.demolition?'철거 포함':'',o.baseboard?'걸레받이 포함':''].filter(Boolean).join(' / ');
    } else if(id==='middoor'){
      amount=calcDoor(o);
      details=[{three_fold:'3연동',slim_three_fold:'슬림3연동',one_slide:'원슬라이딩',swing:'스윙'}[o.type]||'3연동',{basic:'기본형',mid:'중급형',premium:'고급형'}[o.grade]||'기본형'].join(' / ');
    } else if(id==='lighting'){amount=calcLight(o);}
    else if(id==='film'){amount=calcFilm(o);}
    else if(id==='builtin_closet'){amount=calcCloset(o);}
    /* v4 신규 공종 */
    else if(id==='window_sash'){
      amount=calcWindowSash(o);
      details=[
        {pvc:'PVC',aluminum:'알루미늄',system:'시스템창호'}[o.type||'pvc'],
        {basic:'기본등급',mid:'중급등급',premium:'고급등급'}[o.grade||'basic'],
        `${pn(o.qty)||1}개`,
        o.insulation?'단열 시공 포함':'',
        o.demolition?'철거 포함':'',
      ].filter(Boolean).join(' / ');
      label='샷시/창호';
    } else if(id==='balcony_extension'){
      amount=calcBalconyExt(o);
      details=[
        `${pn(o.count)||1}개소`,
        {basic:'기본단열',premium:'프리미엄단열'}[o.insulation||'basic'],
        {tile:'타일 마감',wood:'원목마루 마감'}[o.floor||'tile'],
        o.sashIncluded?'샷시 교체 포함':'',
        pn(o.extraSqm)>0?`추가 ${o.extraSqm}㎡`:'',
      ].filter(Boolean).join(' / ');
      label='베란다 확장';
    } else if(id==='demolition_disposal'){
      amount=calcDemolition(o,py);
      details=[
        {light:'경량 철거',standard:'표준 철거',heavy:'전면 철거'}[o.level||'standard'],
        py?`${py}평`:'-',
        `폐기물 ${pn(o.wasteTon)||2}톤`,
      ].filter(Boolean).join(' / ');
      label='철거/폐기';
    } else if(id==='electrical_network'){
      amount=calcElectrical(o);
      const d=[];
      if(o.electricBase&&o.electricBase!=='none')d.push({basic:'전기 기본',full:'전기 전면'}[o.electricBase]);
      if(o.network&&o.network!=='none')d.push({basic:'통신 기본',premium:'통신 프리미엄'}[o.network]);
      if(o.panel)d.push('분전반 교체');
      if(pn(o.outletQty)>0)d.push(`콘센트 ${o.outletQty}개`);
      if(o.evCharger)d.push('EV 충전');
      details=d.join(', ')||'미선택';
      label='전기/통신';
    } else if(id==='others'){amount=calcOthers(o);label='기타 공사';}
    return {id,label,amount,details};
  }),[sel,opts,py]);

  const total=subtotals.reduce((s,i)=>s+i.amount,0);
  const disc=pn(adj.discount),ex=pn(adj.extra),mar=pn(adj.margin);
  const afterDisc=total-disc+ex;
  const finalBase=afterDisc*(1+mar/100);
  const vat=vatOn?finalBase*0.1:0;
  const final=finalBase+vat;

  /* 저장 */
  const save=()=>{
    const baseId=editId||genId();
    const newVer=editId?editVersion:1;
    const data={id:baseId,version:newVer,customer:cust,selectedTypes:sel,options:opts,adj,vatOn,finalAmount:Math.round(final),savedAt:new Date().toISOString()};
    try{
      const prev=JSON.parse(localStorage.getItem('interior_estimates')||'[]');
      const next=editId?prev.map(i=>i.id===editId?data:i):[data,...prev];
      localStorage.setItem('interior_estimates',JSON.stringify(next));
      setEditId(baseId); setEditVersion(newVer);
      toast('견적이 저장되었습니다 ✓','success');
    }catch{ toast('저장에 실패했습니다','error'); }
  };

  /* 새 버전으로 저장 */
  const saveNewVersion=()=>{
    if(!editId){save();return;}
    const newVer=editVersion+1;
    const newId=genId();
    const data={id:newId,version:newVer,customer:cust,selectedTypes:sel,options:opts,adj,vatOn,finalAmount:Math.round(final),savedAt:new Date().toISOString()};
    try{
      const prev=JSON.parse(localStorage.getItem('interior_estimates')||'[]');
      localStorage.setItem('interior_estimates',JSON.stringify([data,...prev]));
      setEditId(newId); setEditVersion(newVer);
      toast(`v${newVer}로 새 버전 저장 완료 ✓`,'success');
    }catch{ toast('저장 실패','error'); }
  };

  /* 불러오기 */
  const load=data=>{
    setCust({name:'',phone:'',address:'',pyeong:'',pyeongSupply:'',aptType:'',moveInDate:'',consultDate:'',memo:'',...(data.customer||{})});
    setSel(data.selectedTypes||[]);
    const merged={...IO,...data.options};
    if(!merged.bathrooms)merged.bathrooms=[{id:'master',label:'안방욕실',opt:{...IB}}];
    setOpts(merged);
    setAdj(data.adj||{discount:'',extra:'',margin:''});
    setVatOn(data.vatOn||false);
    setEditId(data.id); setEditVersion(data.version||1);
    const o={};(data.selectedTypes||[]).forEach(id=>{o[id]=true;});setOpens(o);
    toast('견적을 불러왔습니다','info');
  };

  /* 템플릿 적용 */
  const applyTmpl=t=>{
    if(t.pyeong)setCust(c=>({...c,pyeong:t.pyeong}));
    setSel(t.selectedTypes||[]);
    const merged={...IO,...t.opts};
    if(!merged.bathrooms)merged.bathrooms=[{id:'master',label:'안방욕실',opt:{...IB}}];
    setOpts(merged);
    const o={};(t.selectedTypes||[]).forEach(id=>{o[id]=true;});setOpens(o);
    setPage('estimate');
    toast(`"${t.name}" 템플릿이 적용되었습니다`,'success');
  };

  /* 초기화 */
  const reset=()=>{
    if(!confirm('모든 입력을 초기화할까요?'))return;
    setCust({name:'',phone:'',address:'',pyeong:'',memo:''});
    setSel([]); setOpens({}); setOpts({...IO});
    setAdj({discount:'',extra:'',margin:''}); setVatOn(false);
    setEditId(null); setEditVersion(1); setHiddenItems([]); setRefSel([]); setRefNotes({});
    toast('초기화 완료','info');
  };

  const renderSec=id=>{
    const open=opens[id]!==false;
    const tog=()=>toggleOpen(id);
    if(id==='grout')    return R(GroutSection,{key:id,opt:opts.grout||{type:'cement',sqm:'',extra:''},onChange:v=>setOpt('grout',v),open,onToggle:tog});
    if(id==='bathroom') return R(BathSection,{key:id,bathrooms:opts.bathrooms,onChange:v=>setOpt('bathrooms',v),open,onToggle:tog});
    if(id==='kitchen')  return R(KitSection,{key:id,opt:opts.kitchen,onChange:v=>setOpt('kitchen',v),open,onToggle:tog});
    if(id==='wallpaper')return R(WallSection,{key:id,opt:opts.wallpaper,onChange:v=>setOpt('wallpaper',v),py,open,onToggle:tog});
    if(id==='flooring') return R(FloorSection,{key:id,opt:opts.flooring,onChange:v=>setOpt('flooring',v),py,open,onToggle:tog});
    if(id==='middoor')  return R(DoorSection,{key:id,opt:opts.middoor,onChange:v=>setOpt('middoor',v),open,onToggle:tog});
    if(id==='lighting') return R(LightSection,{key:id,opt:opts.lighting,onChange:v=>setOpt('lighting',v),open,onToggle:tog});
    if(id==='film')     return R(FilmSection,{key:id,opt:opts.film,onChange:v=>setOpt('film',v),open,onToggle:tog});
    if(id==='builtin_closet')return R(ClosetSection,{key:id,opt:opts.builtin_closet,onChange:v=>setOpt('builtin_closet',v),open,onToggle:tog});
    /* v4 신규 공종 */
    if(id==='window_sash')      return R(WindowSashSection,{key:id,opt:opts.window_sash,onChange:v=>setOpt('window_sash',v),open,onToggle:tog});
    if(id==='balcony_extension')return R(BalconyExtSection,{key:id,opt:opts.balcony_extension,onChange:v=>setOpt('balcony_extension',v),open,onToggle:tog});
    if(id==='demolition_disposal')return R(DemolitionSection,{key:id,opt:opts.demolition_disposal,onChange:v=>setOpt('demolition_disposal',v),py,open,onToggle:tog});
    if(id==='electrical_network')return R(ElectricalSection,{key:id,opt:opts.electrical_network,onChange:v=>setOpt('electrical_network',v),open,onToggle:tog});
    if(id==='others')   return R(OtherSection,{key:id,others:opts.others,onChange:v=>setOpt('others',v),open,onToggle:tog});
  };

  return R('div',null,
    /* ─── Toast ─── */
    R('div',{className:'toast-wrap no-print'},
      toasts.map(t=>R('div',{key:t.id,className:`toast ${t.type}`},
        {success:'✓',error:'✕',info:'ℹ',warn:'⚠'}[t.type]||'', t.msg
      ))
    ),

    /* ─── Nav ─── */
    R('nav',{className:'nav no-print'},
      R('div',{className:'nav-logo'},
        R('div',{className:'nav-logo-mark'},'🏠'),'서진인테리어 ',R('span',{className:'badge badge-ver',style:{fontSize:8,verticalAlign:'middle',marginLeft:4}},'v5')
      ),
      R('div',{className:'nav-tabs'},
        R('button',{className:`ntab ${page==='estimate'?'on':''}`,onClick:()=>setPage('estimate')},'견적 작성'),
        R('button',{className:`ntab ${page==='dashboard'?'on':''}`,onClick:()=>setPage('dashboard')},'통계')
      ),
      R('div',{className:'nav-right'},
        editId&&R('span',{className:'badge badge-gold',style:{fontSize:9}},
          'v'+(editVersion||1)+' · '+editId.slice(-8)
        ),
        R('button',{className:'btn btn-ghost',style:{fontSize:11},onClick:()=>setModal('company')},'🏢 업체설정'),
        R('button',{className:'btn btn-ghost',style:{fontSize:11},onClick:()=>setModal('template')},'📋 템플릿'),
        R('button',{className:'btn btn-ghost',style:{fontSize:11},onClick:()=>setModal('saved')},'📁 불러오기'),
        R('button',{className:'btn btn-ghost',style:{fontSize:11},onClick:save},'💾 저장'),
        editId&&R('button',{className:'btn btn-ghost',style:{fontSize:11},onClick:saveNewVersion},'📌 새버전'),
        R('button',{className:'btn btn-ghost',style:{fontSize:11,color:'#f9b9b5'},onClick:reset},'↺ 초기화'),
      )
    ),

    /* ─── 견적 작성 페이지 ─── */
    page==='estimate'&&R('div',{className:'workspace'},

      /* 왼쪽 */
      R('div',{className:'main-col'},

        /* 고객 정보 */
        R('div',{className:'card'},
          R('div',{className:'card-hd'},R('span',{className:'card-label'},R('span',{className:'ico'},'👤'),'고객 정보')),
          R('div',{className:'card-body'},
            R('div',{className:'fg2'},
              R('div',{className:'fg'},R('label',{className:'flabel'},'고객명'),R('input',{type:'text',className:'finput',value:cust.name,placeholder:'홍길동',onChange:e=>setCust(c=>({...c,name:e.target.value}))})),
              R('div',{className:'fg'},R('label',{className:'flabel'},'연락처'),R('input',{type:'tel',className:'finput',value:cust.phone,placeholder:'010-0000-0000',onChange:e=>setCust(c=>({...c,phone:e.target.value}))})),
              R('div',{className:'fg full'},R('label',{className:'flabel'},'현장 주소'),R('input',{type:'text',className:'finput',value:cust.address,placeholder:'서울시 강남구 역삼동',onChange:e=>setCust(c=>({...c,address:e.target.value}))})),
              R('div',{className:'fg'},
                R('label',{className:'flabel'},'견적면적(전용)'),
                R('div',{style:{display:'flex',alignItems:'center',gap:5}},
                  R('input',{type:'number',className:'finput',value:cust.pyeong,placeholder:'예: 25',min:0,onChange:e=>setCust(c=>({...c,pyeong:e.target.value}))}),
                  R('span',{style:{fontSize:11,color:'var(--c-muted)',whiteSpace:'nowrap'}},'평')
                )
              ),
              R('div',{className:'fg'},
                R('label',{className:'flabel'},'공급면적'),
                R('div',{style:{display:'flex',alignItems:'center',gap:5}},
                  R('input',{type:'number',className:'finput',value:cust.pyeongSupply,placeholder:'예: 33',min:0,onChange:e=>setCust(c=>({...c,pyeongSupply:e.target.value}))}),
                  R('span',{style:{fontSize:11,color:'var(--c-muted)',whiteSpace:'nowrap'}},'평')
                ),
                py>0&&!cust.pyeong&&R('span',{style:{fontSize:10,color:'var(--c-info)'}},'→ 전용환산: 약 '+py+'평')
              ),
              R('div',{className:'fg'},R('label',{className:'flabel'},'건물유형'),
                R('select',{className:'finput',value:cust.aptType||'',onChange:e=>setCust(c=>({...c,aptType:e.target.value}))},
                  R('option',{value:''},'선택'),
                  ['아파트','빌라','오피스텔','단독주택','상가/사무실'].map(v=>R('option',{key:v,value:v},v))
                )
              ),
              R('div',{className:'fg'},R('label',{className:'flabel'},'상담일'),R('input',{type:'date',className:'finput',value:cust.consultDate||'',onChange:e=>setCust(c=>({...c,consultDate:e.target.value}))})),
              R('div',{className:'fg'},R('label',{className:'flabel'},'입주예정일'),R('input',{type:'date',className:'finput',value:cust.moveInDate||'',onChange:e=>setCust(c=>({...c,moveInDate:e.target.value}))})),
              R('div',{className:'fg full'},R('label',{className:'flabel'},'메모'),R('textarea',{className:'finput',value:cust.memo,placeholder:'고객 요청사항, 특이사항 등',onChange:e=>setCust(c=>({...c,memo:e.target.value}))})),
            )
          )
        ),

        /* 공사 항목 선택 */
        R('div',{className:'card'},
          R('div',{className:'card-hd'},
            R('span',{className:'card-label'},R('span',{className:'ico'},'🏗'),'공사 항목'),
            sel.length>0&&R('span',{className:'badge badge-navy'},sel.length+'개 선택')
          ),
          R('div',{className:'card-body'},
            R('div',{className:'proj-grid'},
              PTYPES.map(p=>R('button',{key:p.id,className:`pjbtn ${sel.includes(p.id)?'on':''}`,onClick:()=>toggleSel(p.id),type:'button'},
                R('span',{className:'e'},p.e),p.label
              ))
            )
          )
        ),

        /* 세부 옵션 */
        sel.length>0&&R('div',{className:'card'},
          R('div',{className:'card-hd'},R('span',{className:'card-label'},R('span',{className:'ico'},'⚙'),'세부 옵션')),
          R('div',{className:'card-body',style:{padding:'10px 13px'}},sel.map(id=>renderSec(id)))
        ),

        /* 고객 참고 항목 */
        R(RefSection,{refSel,refNotes,onToggle:toggleRef,onNote:setRefNote}),

        /* 금액 조정 */
        R('div',{className:'card'},
          R('div',{className:'card-hd'},R('span',{className:'card-label'},R('span',{className:'ico'},'💰'),'금액 조정 및 설정')),
          R('div',{className:'card-body',style:{display:'flex',flexDirection:'column',gap:9}},
            R('div',{className:'fg2'},
              R('div',{className:'adj-row'},R('label',{className:'flabel'},'할인'),R('input',{type:'number',className:'finput',value:adj.discount,placeholder:'0',min:0,style:{textAlign:'right'},onChange:e=>setAdj(a=>({...a,discount:Math.max(0,parseFloat(e.target.value)||'')}))}),R('span',{className:'unit'},'원')),
              R('div',{className:'adj-row'},R('label',{className:'flabel'},'추가금'),R('input',{type:'number',className:'finput',value:adj.extra,placeholder:'0',min:0,style:{textAlign:'right'},onChange:e=>setAdj(a=>({...a,extra:Math.max(0,parseFloat(e.target.value)||'')}))}),R('span',{className:'unit'},'원')),
              R('div',{className:'adj-row'},R('label',{className:'flabel'},'마진율'),R('input',{type:'number',className:'finput',value:adj.margin,placeholder:'0',min:0,max:100,style:{textAlign:'right'},onChange:e=>setAdj(a=>({...a,margin:Math.min(100,Math.max(0,parseFloat(e.target.value)||''))}))}),R('span',{className:'unit'},'%')),
            ),
            R('div',{className:'divider'}),
            /* VAT 토글 */
            R('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}},
              R('span',{style:{fontSize:12,fontWeight:700,color:'var(--c-navy)'}},'부가세 (VAT 10%)'),
              R('div',{style:{display:'flex',gap:5}},
                R('button',{className:`tg ${!vatOn?'on':''}`,onClick:()=>setVatOn(false),type:'button'},'별도'),
                R('button',{className:`tg ${vatOn?'on':''}`,onClick:()=>setVatOn(true),type:'button'},'포함')
              )
            ),
            vatOn&&R('div',{className:'vat-box'},
              R('div',{className:'vat-row'},R('span',null,'공급가'),R('span',null,fmt(finalBase))),
              R('div',{className:'vat-row'},R('span',null,'부가세 (10%)'),R('span',null,fmt(vat))),
              R('div',{className:'vat-row total'},R('span',null,'합계'),R('span',null,fmt(final)))
            ),
            R('div',{className:'divider'}),
            /* 결제 분할 */
            R('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}},
              R('span',{style:{fontSize:12,fontWeight:700,color:'var(--c-navy)'}},'결제 일정 설정'),
              R('button',{className:`tg ${showPay?'on':''}`,onClick:()=>setShowPay(p=>!p),type:'button'},showPay?'접기':'설정')
            ),
            showPay&&R('div',{className:'fg3',style:{marginTop:4}},
              ['contract','middle','balance'].map((k,i)=>
                R('div',{key:k,className:'fg'},
                  R('label',{className:'flabel'},['계약금','중도금','잔금'][i]),
                  R('div',{style:{display:'flex',gap:4,alignItems:'center'}},
                    R('input',{type:'number',className:'finput',value:payRatios[k],min:0,max:100,style:{textAlign:'right'},
                      onChange:e=>setPayRatios(p=>({...p,[k]:Math.min(100,Math.max(0,parseInt(e.target.value)||0))}))}),
                    R('span',{style:{fontSize:11,color:'var(--c-muted)'}},'%')
                  )
                )
              )
            ),
            showPay&&R('div',{className:'pay-box'},
              ['contract','middle','balance'].map((k,i)=>
                payRatios[k]>0&&R('div',{key:k,className:'pay-row'},
                  R('span',{className:'pay-label'},['계약금 ('+payRatios.contract+'%)','중도금 ('+payRatios.middle+'%)','잔금 ('+payRatios.balance+'%)'][i]),
                  R('span',{className:'pay-amt'},fmt(Math.round(final*(pn(payRatios[k])/100))))
                )
              )
            ),
          )
        ),

        /* 고객용 노출 항목 설정 */
        sel.length>0&&R('div',{className:'card'},
          R('div',{className:'card-hd'},R('span',{className:'card-label'},R('span',{className:'ico'},'👁'),'고객용 견적서 노출 항목')),
          R('div',{className:'card-body'},
            R('p',{style:{fontSize:11,color:'var(--c-muted)',marginBottom:10}},'고객용 견적서에서 숨길 항목을 선택하세요.'),
            R('div',{style:{display:'flex',flexWrap:'wrap',gap:7}},
              subtotals.map(item=>R('label',{key:item.id,className:'cbox'},
                R('input',{type:'checkbox',checked:hiddenItems.includes(item.id),
                  onChange:e=>setHiddenItems(prev=>e.target.checked?[...prev,item.id]:prev.filter(i=>i!==item.id))}),
                R('span',null,item.label+' 숨김')
              ))
            )
          )
        ),

        /* 버튼 */
        R('div',{style:{display:'flex',gap:8,paddingBottom:16}},
          R('button',{className:'btn btn-gold',style:{flex:1},onClick:()=>setModal('customer')},'📄 고객용 견적서'),
          R('button',{className:'btn btn-navy',style:{flex:1},onClick:()=>setModal('internal')},'📋 내부용 견적서'),
        )
      ),

      /* 오른쪽 요약 */
      R('div',{className:'side-col no-print'},
        R('div',{className:'sum-ttl'},'실시간 견적 요약'),

        cust.name&&R('div',{style:{padding:'7px 0',borderBottom:'1px solid var(--c-border)',marginBottom:8}},
          R('div',{style:{fontWeight:800,fontSize:14,color:'var(--c-navy)'}},cust.name),
          cust.address&&R('div',{style:{fontSize:11,color:'var(--c-muted)'}},'📍 '+cust.address),
          (cust.pyeong||cust.pyeongSupply)&&R('div',{style:{fontSize:11,color:'var(--c-muted)'}},'📐 '+[cust.pyeong?cust.pyeong+'평(전용)':'',cust.pyeongSupply?cust.pyeongSupply+'평(공급)':''].filter(Boolean).join(' / ')),
        ),

        R('div',{className:'sec-head'},'항목별 금액'),
        subtotals.length===0
          ?R('div',{className:'sum-empty'},'공사 항목을 선택하면\n금액이 표시됩니다.')
          :subtotals.map(item=>R('div',{key:item.id,className:'sum-item'},
              R('span',{className:'sim-name'},PTYPES.find(p=>p.id===item.id)?.e,' ',item.label),
              R('span',{className:'sim-amt'},fmt(item.amount))
            )),

        R('div',{className:'divider'}),
        disc>0&&R('div',{className:'sum-item'},R('span',{style:{color:'var(--c-danger)'}},'할인'),R('span',{style:{color:'var(--c-danger)',fontWeight:700}},'− '+fmt(disc))),
        ex>0&&R('div',{className:'sum-item'},R('span',null,'추가'),R('span',{className:'sim-amt'},'+ '+fmt(ex))),
        mar>0&&R('div',{className:'sum-item'},R('span',null,'마진'),R('span',{className:'sim-amt'},fmt(finalBase-afterDisc))),
        vatOn&&R('div',{className:'sum-item'},R('span',null,'VAT'),R('span',{className:'sim-amt'},fmt(vat))),

        R('div',{className:'total-box'},
          R('div',{className:'tlbl'},'최종 견적 금액'),
          R('div',{className:'tamt'},fmt(final)),
          R('div',{className:'tsub'},
            total>0&&R('span',null,'합계: '+fmt(total)),
            disc>0&&R('span',null,'할인: − '+fmt(disc)),
            vatOn&&R('span',null,'VAT 포함')
          )
        ),

        R('div',{style:{display:'flex',flexDirection:'column',gap:6,marginTop:4}},
          R('button',{className:'btn btn-gold btn-full',onClick:()=>setModal('customer')},'📄 고객용 견적서'),
          R('button',{className:'btn btn-kakao btn-full',onClick:()=>setModal('customer')},'💬 카카오톡 공유'),
          R('button',{className:'btn btn-navy btn-full',onClick:()=>setModal('internal')},'📋 내부용 견적서'),
          R('button',{className:'btn btn-outline btn-full',onClick:save},'💾 저장'),
          editId&&R('button',{className:'btn btn-outline btn-full',onClick:saveNewVersion},'📌 새 버전으로 저장'),
        )
      )
    ),

    /* ─── 대시보드 ─── */
    page==='dashboard'&&R(Dashboard,null),

    /* ─── 모달 ─── */
    (modal==='customer'||modal==='internal')&&R(PrintModal,{
      customer:cust, subtotals, adj,
      company:co,
      mode:modal, vatOn, payRatios, hiddenItems, refSel, refNotes,
      onClose:()=>setModal(null), toast
    }),
    modal==='saved'&&R(SavedModal,{onLoad:load,onClose:()=>setModal(null)}),
    modal==='template'&&R(TmplModal,{onApply:applyTmpl,onClose:()=>setModal(null)}),

    modal==='company'&&R(CompanyModal,{co,setCo,onClose:()=>setModal(null),toast}),

    /* ─── 모바일 하단 고정 바 ─── */
    page==='estimate'&&R('div',{className:'mob-bar no-print'},
      R('div',{className:'mob-bar-amt'},
        R('div',{className:'mob-bar-lbl'},'최종 견적'),
        R('div',{className:'mob-bar-val'},fmt(final))
      ),
      R('div',{className:'mob-bar-btns'},
        R('button',{className:'btn btn-gold btn-sm',onClick:()=>setModal('customer')},'📄 견적서'),
        R('button',{className:'btn btn-kakao btn-sm',onClick:()=>setModal('customer')},'💬 공유'),
        R('button',{className:'btn btn-outline btn-sm',style:{color:'#fff',borderColor:'rgba(255,255,255,.3)'},onClick:save},'💾'),
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(R(App));
</script>
</body>
</html>

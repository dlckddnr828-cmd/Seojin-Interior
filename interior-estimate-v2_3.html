/* ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧

:root {
  --c-bg:       #F8FAFC;
  --c-surface:  #FFFFFF;
  --c-surface2: #F1F5F9;
  --c-border:   #E2E8F0;
  --c-border2:  #CBD5E1;
  --c-text:     #0F172A;
  --c-muted:    #64748B;
  --c-muted2:   #94A3B8;

  --c-gold:     #C5A059;
  --c-gold-lt:  #FDFBF7;
  --c-gold-dk:  #9A7B3E;

  --c-navy:     #0F172A;
  --c-navy2:    #1E293B;
  --c-navy-lt:  #F1F5F9;

  --c-danger:   #EF4444;
  --c-danger-lt:#FEF2F2;
  --c-success:  #10B981;
  --c-success-lt:#ECFDF5;
  --c-info:     #3B82F6;
  --c-info-lt:  #EFF6FF;
  --c-warn:     #F59E0B;
  --c-warn-lt:  #FFFBEB;

  --r-sm: 6px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 24px;

  --sh-sm:  0 2px 8px rgba(15,23,42,.04);
  --sh-md:  0 8px 24px rgba(15,23,42,.06);
  --sh-lg:  0 16px 40px rgba(15,23,42,.08);

  --t-fast: .15s;
  --t-mid:  .3s;
}

/* ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧
   由ъ뀑 & 湲곕낯
?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧 */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family:'Pretendard', sans-serif;
  background:var(--c-bg);
  color:var(--c-text);
  min-height:100vh;
  font-size:14px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3 { font-family:'Noto Serif KR', serif; letter-spacing:-0.5px; }

/* ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧
   TOAST ?뚮┝
?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧 */
.toast-wrap {
  position:fixed; top:68px; right:16px; z-index:9999;
  display:flex; flex-direction:column; gap:10px; pointer-events:none;
}
.toast {
  padding:12px 20px; border-radius:var(--r-md);
  font-size:13px; font-weight:600; color:#fff;
  box-shadow:var(--sh-lg); pointer-events:none;
  animation:toastIn .3s cubic-bezier(0.16, 1, 0.3, 1), toastOut .3s ease 2.5s forwards;
  display:flex; align-items:center; gap:10px;
  max-width:320px; backdrop-filter:blur(8px);
}
.toast.success { background:rgba(16, 185, 129, 0.9); }
.toast.error   { background:rgba(239, 68, 68, 0.9); }
.toast.info    { background:rgba(59, 130, 246, 0.9); }
.toast.warn    { background:rgba(245, 158, 11, 0.9); }
@keyframes toastIn  { from{opacity:0;transform:translateY(-10px) scale(0.95)} to{opacity:1;transform:translateY(0) scale(1)} }
@keyframes toastOut { to{opacity:0;transform:translateX(20px)} }

/* ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧
   ?곷떒 ?ㅻ퉬
?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧 */
.nav {
  background:rgba(15, 23, 42, 0.85);
  backdrop-filter:blur(12px);
  height:60px; padding:0 24px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:500;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.nav-logo {
  font-family:'Noto Serif KR', serif;
  font-size:17px; font-weight:700;
  color:#fff; display:flex; align-items:center; gap:10px;
  letter-spacing:-.3px;
}
.nav-logo-mark {
  width:32px; height:32px; background:linear-gradient(135deg, #D4AF37, var(--c-gold));
  border-radius:8px; display:flex; align-items:center; justify-content:center;
  font-size:16px; box-shadow:0 2px 10px rgba(197, 160, 89, 0.3);
}
.nav-tabs { display:flex; gap:4px; }
.ntab {
  height:60px; padding:0 18px; border:none; background:transparent;
  color:rgba(255,255,255,.6); font-family:inherit; font-size:13px; font-weight:600;
  cursor:pointer; position:relative;
  letter-spacing:.5px; text-transform:uppercase; transition:all var(--t-mid);
}
.ntab::after {
  content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:0; height:3px; background:var(--c-gold); transition:all var(--t-mid);
  border-radius:3px 3px 0 0;
}
.ntab:hover { color:rgba(255,255,255,.9); }
.ntab.on { color:#fff; }
.ntab.on::after { width:100%; }
.nav-right { display:flex; gap:8px; align-items:center; }

/* ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧
   LAYOUT
?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧 */
.workspace {
  display:grid;
  grid-template-columns:1fr 360px;
  min-height:calc(100vh - 60px);
  align-items:start;
}
.main-col {
  padding:24px 24px 100px;
  display:flex; flex-direction:column; gap:20px;
}
.side-col {
  background:rgba(255, 255, 255, 0.6);
  backdrop-filter:blur(20px);
  border-left:1px solid var(--c-border);
  padding:20px;
  position:sticky; top:60px;
  height:calc(100vh - 60px);
  overflow-y:auto;
  display:flex; flex-direction:column; gap:12px;
}

/* ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧
   CARD
?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧 */
.card {
  background:var(--c-surface);
  border:1px solid var(--c-border);
  border-radius:var(--r-xl);
  box-shadow:var(--sh-sm);
  overflow:hidden;
  transition:box-shadow var(--t-mid);
}
.card:hover { box-shadow:var(--sh-md); }
.card-hd {
  padding:16px 20px;
  border-bottom:1px solid var(--c-border);
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(248, 250, 252, 0.5);
}
.card-hd.clickable { cursor:pointer; user-select:none; }
.card-hd.clickable:hover { background:var(--c-surface2); }
.card-label {
  font-size:14px; font-weight:700;
  letter-spacing:-.2px;
  color:var(--c-navy); display:flex; align-items:center; gap:8px;
}
.card-label .ico { font-size:18px; }
.card-body { padding:20px; }

/* ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧
   FORM
?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧 */
.fg  { display:flex; flex-direction:column; gap:6px; }
.fg2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.fg3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.fg.full { grid-column:1/-1; }
.flabel {
  font-size:11px; font-weight:700;
  color:var(--c-muted); text-transform:uppercase; letter-spacing:.5px;
}
.finput {
  padding:10px 14px;
  border:1px solid var(--c-border2);
  border-radius:var(--r-md);
  font-family:inherit; font-size:14px; color:var(--c-text);
  background:var(--c-surface);
  transition:all var(--t-fast);
  width:100%;
}
.finput:focus {
  outline:none; border-color:var(--c-gold);
  box-shadow:0 0 0 3px rgba(197, 160, 89, 0.15);
  background:#fff;
}
textarea.finput { resize:vertical; min-height:60px; line-height:1.5; }
input[type=number].finput { -moz-appearance:textfield; font-variant-numeric: tabular-nums; }
input[type=number].finput::-webkit-inner-spin-button,
input[type=number].finput::-webkit-outer-spin-button { -webkit-appearance:none; }
.hint { font-size:11px; color:var(--c-danger); margin-top:4px; }

/* ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧
   PROJECT GRID
?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧 */
.proj-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:10px; }
.pjbtn {
  padding:16px 8px 14px;
  border:1px solid var(--c-border);
  border-radius:var(--r-lg);
  background:var(--c-surface);
  cursor:pointer; text-align:center;
  font-family:inherit; font-size:13px; font-weight:600;
  color:var(--c-muted); letter-spacing:-.2px;
  transition:all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  display:flex; flex-direction:column; align-items:center; gap:8px;
  box-shadow:var(--sh-sm);
}
.pjbtn .e { font-size:28px; line-height:1; transition:transform 0.2s ease; }
.pjbtn:hover { border-color:var(--c-border2); color:var(--c-text); box-shadow:var(--sh-md); transform:translateY(-2px); }
.pjbtn:hover .e { transform:scale(1.1); }
.pjbtn.on {
  border-color:var(--c-gold); background:var(--c-gold-lt);
  color:var(--c-navy); box-shadow:0 4px 12px rgba(197, 160, 89, 0.15); font-weight:700;
}

/* ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧
   OPTION SECTIONS
?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧 */
.osec {
  border:1px solid var(--c-border);
  border-radius:var(--r-md);
  overflow:hidden; margin-bottom:12px;
  background:var(--c-surface);
  transition:box-shadow var(--t-fast);
}
.osec:hover { box-shadow:var(--sh-sm); }
.osec-hd {
  padding:12px 16px; background:var(--c-surface2);
  font-weight:700; font-size:14px; color:var(--c-navy);
  border-bottom:1px solid var(--c-border);
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; user-select:none; transition:background var(--t-fast);
}
.osec-hd:hover { background:rgba(226, 232, 240, 0.6); }
.osec-body { padding:16px; display:flex; flex-direction:column; gap:12px; }

.orow { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
.olbl { font-size:14px; color:var(--c-text); min-width:86px; font-weight:600; }

/* ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧
   TOGGLE BUTTONS
?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧 */
.tg-wrap { display:flex; gap:6px; flex-wrap:wrap; flex:1; justify-content:flex-end; }
.tg {
  padding:6px 12px;
  border:1px solid var(--c-border2);
  border-radius:var(--r-sm);
  background:var(--c-surface);
  cursor:pointer; font-family:inherit;
  font-size:12px; font-weight:600; color:var(--c-muted);
  transition:all var(--t-fast); white-space:nowrap;
}
.tg:hover { border-color:var(--c-muted); color:var(--c-text); }
.tg.on { border-color:var(--c-gold); background:var(--c-gold); color:#fff; box-shadow:0 2px 8px rgba(197, 160, 89, 0.25); }
.tg.on:hover { filter:brightness(0.95); }

/* CHECKBOX */
.cbox { display:flex; align-items:center; gap:8px; cursor:pointer; }
.cbox input[type=checkbox] { width:18px; height:18px; accent-color:var(--c-gold); flex-shrink:0; cursor:pointer; }
.cbox span { font-size:13px; color:var(--c-text); font-weight:500; }

/* ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧
   BATHROOM TABS
?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧 */
.bath-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
.btab {
  padding:6px 14px; border:1px solid var(--c-border2);
  border-radius:99px; background:var(--c-surface);
  cursor:pointer; font-family:inherit;
  font-size:12px; font-weight:600; color:var(--c-muted);
  transition:all var(--t-fast); display:flex; align-items:center; gap:6px;
}
.btab:hover { border-color:var(--c-muted); color:var(--c-text); }
.btab.on { border-color:var(--c-navy); background:var(--c-navy); color:#fff; box-shadow:0 2px 8px rgba(15, 23, 42, 0.2); }
.btab .x { font-size:10px; opacity:.75; padding:2px; }
.btab .x:hover { opacity:1; color:var(--c-danger); }
.bath-add {
  padding:6px 14px; border:1px dashed var(--c-muted2);
  border-radius:99px; background:transparent;
  cursor:pointer; font-family:inherit;
  font-size:12px; font-weight:600; color:var(--c-muted);
  transition:all var(--t-fast);
}
.bath-add:hover { border-color:var(--c-gold); color:var(--c-gold); background:var(--c-gold-lt); }

/* ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧
   SUBTOTAL
?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧 */
.sub-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 0 0; border-top:1px dashed var(--c-border2); margin-top:6px;
}
.sub-lbl { font-size:12px; color:var(--c-muted); font-weight:600; }
.sub-amt { font-size:16px; font-weight:700; color:var(--c-navy); font-variant-numeric: tabular-nums; }

/* ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧
   BUTTONS
?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧 */
.btn {
  padding:10px 18px; border-radius:var(--r-md);
  border:none; cursor:pointer; font-family:inherit;
  font-size:13px; font-weight:600;
  transition:all 0.2s cubic-bezier(0.16, 1, 0.3, 1);

  touch-action:manipulation;
}
.btn:hover { transform:translateY(-1px); }
.btn:active { transform:scale(0.97); opacity:.9; }
@media (hover:none) {
  /* 터치 기기에서 hover 애니메이션 제거 */
  .btn:hover { transform:none; }

}

.btn-navy:hover { filter:brightness(1.1); box-shadow:0 6px 16px rgba(15, 23, 42, 0.3); }
.btn-ghost  { background:transparent; color:rgba(255,255,255,.7); border:1px solid rgba(255,255,255,.2); }
.btn-ghost:hover { background:rgba(255,255,255,.1); color:#fff; border-color:rgba(255,255,255,.4); }
.btn-outline { background:transparent; color:var(--c-navy); border:1px solid var(--c-border2); }
.btn-outline:hover { border-color:var(--c-navy); background:var(--c-surface2); }
.btn-danger { background:var(--c-danger-lt); color:var(--c-danger); border:1px solid rgba(239, 68, 68, 0.2); }

.btn-success { background:var(--c-success-lt); color:var(--c-success); border:1px solid rgba(16, 185, 129, 0.2); }
.btn-success:hover { background:var(--c-success); color:#fff; }
.btn-kakao { background:#FEE500; color:#3C1E1E; font-weight:700; box-shadow:0 4px 12px rgba(254, 229, 0, 0.25); }
.btn-kakao:hover { background:#f0d800; box-shadow:0 6px 16px rgba(254, 229, 0, 0.3); }
.btn-sm { padding:6px 12px; font-size:12px; border-radius:var(--r-sm); }
.btn-full { width:100%; }
.btn:disabled { opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }

.overlay {
  position:fixed; inset:0; background:rgba(15, 23, 42, 0.6);
  z-index:600; display:flex; align-items:center; justify-content:center;
  padding:20px; backdrop-filter:blur(6px);
}
.modal {
  background:var(--c-surface); border-radius:var(--r-xl);
  box-shadow:var(--sh-lg); width:100%; max-width:760px;
  max-height:90vh; overflow-y:auto;
  animation:modalIn .3s cubic-bezier(0.16, 1, 0.3, 1);
  -webkit-overflow-scrolling:touch;
}
/* 모바일 드래그 핸들 */
.modal::before {
  content:'';
  display:none;
  width:40px; height:4px;
  background:var(--c-border2);
  border-radius:2px;
  margin:10px auto 0;
}
.modal-sm { max-width:520px; }
.modal-hd {
  padding:20px 24px; border-bottom:1px solid var(--c-border);
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; background:rgba(255, 255, 255, 0.95); z-index:1;
  backdrop-filter:blur(8px);
}
.modal-ttl { font-family:'Noto Serif KR',serif; font-size:18px; font-weight:700; color:var(--c-navy); letter-spacing:-0.5px; }
.modal-body { padding:24px; }
.modal-ft {
  padding:16px 24px; border-top:1px solid var(--c-border);
  display:flex; gap:10px; justify-content:flex-end;
  position:sticky; bottom:0; background:rgba(255, 255, 255, 0.95);
  backdrop-filter:blur(8px);
}
@keyframes modalIn { from{opacity:0;transform:translateY(20px) scale(0.98)} to{opacity:1;transform:translateY(0) scale(1)} }
@media (max-width:860px) {
  .modal::before { display:block; }
}

/* ═══════════════════════════════════════
   PRINT
═══════════════════════════════════════ */
@media print {
  .no-print { display:none !important; }
  body { background:#fff !important; }
  .overlay { position:static !important; background:none !important; padding:0 !important; }
  .modal { box-shadow:none !important; max-height:none !important; border-radius:0 !important; border:none !important; }
  .modal-hd, .modal-ft { display:none !important; }
  .modal-body { padding:0 !important; }
  .pr-wrap { padding:0 !important; max-width:100% !important; border:none !important; box-shadow:none !important; border-radius:0 !important; margin:0 !important; }
  .pr-pay-item { border:1px solid var(--c-border) !important; }
  @page { margin:15mm; }
}

/* ═══════════════════════════════════════
   RESPONSIVE — 태블릿 (≤860px)
═══════════════════════════════════════ */
@media (max-width:860px) {
  /* 레이아웃 */
  .workspace { grid-template-columns:1fr; }
  .side-col  { display:none; }
  .main-col  { padding:16px 16px 100px; gap:14px; }

  /* 네비 */
  .nav { height:52px; padding:0 14px; }
  .nav-logo { font-size:15px; gap:7px; }
  .nav-logo-mark { width:28px; height:28px; font-size:14px; }
  .ntab { height:52px; padding:0 12px; font-size:11px; }
  .nav-right { gap:4px; }
  .nav-right .btn-ghost { padding:6px 8px; font-size:10px; }

  /* 카드 */
  .card { border-radius:var(--r-lg); }
  .card-hd { padding:12px 14px; }
  .card-label { font-size:13px; }
  .card-body { padding:14px; }

  /* 폼 */
  .fg2 { grid-template-columns:1fr; gap:10px; }
  .fg3 { grid-template-columns:1fr 1fr; gap:10px; }
  .finput { font-size:16px; padding:10px 12px; } /* 16px: iOS 자동 줌 방지 */
  textarea.finput { font-size:15px; }

  /* 공사항목 그리드 */
  .proj-grid { grid-template-columns:repeat(3,1fr); gap:8px; }
  .pjbtn { padding:12px 6px 10px; font-size:12px; }
  .pjbtn .e { font-size:24px; }

  /* 토글/버튼 */
  .tg { padding:7px 10px; font-size:12px; }
  .tg-wrap { gap:5px; }

  /* 욕실 탭 */
  .bath-tabs { gap:5px; }
  .btab { padding:5px 10px; font-size:11px; }

  /* 통계 */
  .stat-grid { grid-template-columns:1fr 1fr; gap:10px; }
  .sv { font-size:20px; }

  /* 템플릿 */
  .tmpl-grid { grid-template-columns:1fr 1fr; gap:10px; }

  /* 모달 */
  .overlay { padding:0; align-items:flex-end; }
  .modal {
    border-radius:var(--r-xl) var(--r-xl) 0 0;
    max-height:92vh;
    animation:modalUp .3s cubic-bezier(0.16,1,0.3,1);
  }
  .modal-sm { max-width:100%; }
  .modal-hd { padding:16px 16px 12px; }
  .modal-ttl { font-size:16px; }
  .modal-body { padding:14px 16px; }
  .modal-ft  { padding:12px 16px; }

  /* 견적서 출력 */
  .pr-info  { grid-template-columns:1fr; }
  .pr-hd    { flex-direction:column; gap:12px; }
  .pr-doc-area { text-align:left; }
  .pr-wrap { padding:24px 20px; }
  .pr-pay-grid { grid-template-columns:1fr; gap:8px; }
  .pr-pay-item { display:flex; justify-content:space-between; align-items:center; text-align:left; }
  .pr-simple-ttl { font-size:26px; }
  .pr-mode-tabs { gap:0; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .pr-mode-tab { padding:8px 14px; font-size:12px; white-space:nowrap; }

  /* 라인아이템 테이블 */
  .line-table { font-size:10px; }
  .line-in { padding:4px 6px; font-size:11px; }

  /* 모바일 바 활성화 */
  .mob-bar { display:flex; }
}

/* ═══════════════════════════════════════
   RESPONSIVE — 모바일 (≤480px)
═══════════════════════════════════════ */
@media (max-width:480px) {
  /* 네비 압축 */
  .nav { padding:0 10px; }
  .nav-tabs { display:none; }
  .nav-right .btn-ghost { padding:5px 7px; font-size:10px; letter-spacing:0; }
  /* 글자 길면 숨김 처리 */
  .nav-right .btn-ghost .txt { display:none; }

  /* 공사항목 2열 */
  .proj-grid { grid-template-columns:repeat(2,1fr); gap:7px; }
  .pjbtn { padding:10px 4px 8px; font-size:11px; }
  .pjbtn .e { font-size:22px; }

  /* 카드 여백 최소화 */
  .main-col { padding:10px 10px 96px; gap:10px; }
  .card-body { padding:12px; }
  .card-hd { padding:10px 12px; }

  /* 폼 3열 → 1열 */
  .fg3 { grid-template-columns:1fr; }

  /* 옵션 행 세로 */
  .orow { flex-direction:column; align-items:flex-start; gap:6px; }
  .tg-wrap { justify-content:flex-start; }

  /* 통계 카드 1열 */
  .stat-grid { grid-template-columns:1fr 1fr; }
  .sv { font-size:18px; }

  /* 템플릿 1열 */
  .tmpl-grid { grid-template-columns:1fr; }

  /* 모달 풀스크린 */
  .modal { max-height:96vh; }

  /* 견적서 출력 */
  .pr-wrap { padding:16px 14px; }
  .pr-simple-ttl { font-size:22px; }
  .pr-tbl thead th, .pr-tbl tbody td { padding:8px 8px; font-size:11px; }
  .pr-det-row { flex-direction:column; gap:4px; }

  /* 하단 버튼바 버튼 크기 */
  .mob-bar-val { font-size:18px; }
  .mob-bar-btns .btn-sm { padding:8px 10px; font-size:11px; }

  /* 욕실 탭 스크롤 */
  .bath-tabs { flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:4px; }
  .btab { flex-shrink:0; }

  /* 라인 테이블 가로 스크롤 */
  .line-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }

  /* 서명 그리드 */
  .pr-sig-grid { grid-template-columns:1fr; gap:16px; }
  .pr-sign { grid-template-columns:1fr; gap:16px; }

  /* 아파트 평형 그리드 */
  .apt-pyrow { grid-template-columns:repeat(3,1fr); }
}

@keyframes modalUp {
  from { opacity:0; transform:translateY(40px); }
  to   { opacity:1; transform:translateY(0); }
}

function loadScriptWithTimeout(url,timeoutMs){
  return new Promise(function(resolve,reject){
    var done=false;
    var t=setTimeout(function(){
      if(done)return;
      done=true;
      reject(new Error('timeout: '+url));
    },timeoutMs||8000);
    var s=document.createElement('script');
    s.src=url;
    s.async=true;
    s.onload=function(){ if(done)return; done=true; clearTimeout(t); resolve(url); };
    s.onerror=function(){ if(done)return; done=true; clearTimeout(t); reject(new Error('load fail: '+url)); };
    document.head.appendChild(s);
  });
}
async function loadFirst(urls,label){
  var errs=[];
  for(var i=0;i<urls.length;i+=1){
    try{ await loadScriptWithTimeout(urls[i],8000); return; }
    catch(e){ errs.push(e.message); }
  }
  throw new Error(label+' 로딩 실패\n'+errs.join('\n'));
}

function deepMerge(target,source){
  Object.keys(source).forEach(function(k){
    if(source[k]&&typeof source[k]==='object'&&!Array.isArray(source[k])&&target[k]&&typeof target[k]==='object'){

const makeLineRow=(seed,isAuto)=>Object.assign(blankLineRow(isAuto),seed||{});
const lineBase=row=>row&&row.directMode?pn(row.directAmount):pn(row.qty)*(pn(row.material)+pn(row.labor)+pn(row.expense));
const lineTotal=row=>{
  const supply=lineBase(row)*(1+pn(row&&row.margin)/100);
  return Math.max(0,supply-pn(row&&row.discount));
};
const lineUnitCost=row=>{
  const q=pn(row&&row.qty);
  if(!q)return 0;
  return Math.round(lineTotal(row)/q);
};

/* ══════════════════ Toast Hook ══════════════════ */
function useToast(){
  const [toasts,setToasts]=useState([]);
  const add=useCallback((msg,type='info')=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),2600);
  },[]);
  return {toasts,toast:add};
}

/* ══════════════════ 다중 욕실 ══════════════════ */
function BathSection({bathrooms,onChange,open,onToggle}){
  const [tab,setTab]=useState(bathrooms[0]?.id||'master');
  const cur=bathrooms.find(b=>b.id===tab)||bathrooms[0];
  const totalAmt=bathrooms.reduce((s,b)=>s+calcBath(b.opt),0);

  const addBath=()=>{
    if(bathrooms.length>=4){alert('최대 4개까지 추가 가능합니다.');return;}
    const used=bathrooms.map(b=>b.id);
    const next=BATH_OPTS.find(o=>!used.includes(o.id));
    if(!next)return;
    const nl=[...bathrooms,{id:next.id,label:next.label,opt:{...IB}}];
    onChange(nl); setTab(next.id);
  };
  const delBath=(id,e)=>{
    e.stopPropagation();
    if(bathrooms.length<=1){alert('욕실은 최소 1개가 필요합니다.');return;}
    const nl=bathrooms.filter(b=>b.id!==id);
    onChange(nl); if(tab===id)setTab(nl[0].id);
  };
  const updOpt=(id,opt)=>onChange(bathrooms.map(b=>b.id===id?{...b,opt}:b));

  return R('div',{className:'osec'},
    R('div',{className:'osec-hd',onClick:onToggle},
      R('span',{style:{display:'flex',alignItems:'center',gap:8}},
        '🛁 욕실', R('span',{className:'tag'},bathrooms.length+'개')
      ),
      R('span',{style:{fontSize:12,color:'var(--c-muted)'}},open?'▾':'▸')
    ),
    open&&R('div',{style:{padding:'10px 13px'}},
      R('div',{className:'bath-tabs'},
        bathrooms.map(b=>R('button',{key:b.id,className:`btab ${tab===b.id?'on':''}`,onClick:()=>setTab(b.id),type:'button'},
          b.label,
          bathrooms.length>1&&R('span',{className:'x',onClick:e=>delBath(b.id,e)},' ✕')
        )),
        bathrooms.length<4&&R('button',{className:'bath-add',onClick:addBath,type:'button'},'+ 추가')
      ),
      cur&&R(BathOpts,{opt:cur.opt,onChange:opt=>updOpt(cur.id,opt)}),
      bathrooms.length>1&&R('div',{className:'sub-row',style:{borderTop:'2px solid var(--c-gold)',paddingTop:8}},
        R('span',{className:'sub-lbl',style:{color:'var(--c-gold-dk)'}},'욕실 전체'),
        R('span',{className:'sub-amt',style:{color:'var(--c-gold-dk)'}},fmt(totalAmt))
      )
    )
  );
}

  var _sharing=useState(false); var sharing=_sharing[0]; var setSharing=_sharing[1];

  var total=subtotals.reduce(function(s,i){return s+i.amount;},0);
  var disc=pn(adj.discount),ex=pn(adj.extra),mar=pn(adj.margin);
  var changeTotal=(changeItems||[]).reduce(function(s,ci){
    var amt=pn(ci.amount);
    return s+(ci.type==='감액'?-amt:amt);
  },0);
  var afterDisc=total-disc+ex+changeTotal;
  var finalBase=afterDisc*(1+mar/100);
  var vat=vatOn?finalBase*0.1:0;
  var final=Math.max(0,finalBase+vat);

  // 고객용 숨김 필터 (간략/상세 고객용에 적용)
  var visItems=(printMode==='internal')
    ?subtotals
    :subtotals.filter(function(i){return hiddenItems.indexOf(i.id)<0;});

  // 분할 결제 금액
  var payAmts={
    contract:Math.round(final*(pn(payRatios.contract)/100)),
    middle:Math.round(final*(pn(payRatios.middle)/100)),
    balance:Math.round(final*(pn(payRatios.balance)/100)),
  };

  function getLineRows(typeId){
    return (lineItemsByType[typeId]||[]).map(function(r){
      return {
        type:'line',
        name:r.name||'항목',
        spec:[r.spec||'',(pn(r.qty)||0)+' '+(r.unit||'')].filter(Boolean).join(' / '),
        qty:pn(r.qty)||0,
        unit:r.unit||'',
        price:lineTotal(r),
        unitCost:lineUnitCost(r),
      };
    });
  }

  // 모달 내 견적서 엑셀 내보내기
  function handleExcelExport(){
    const BOM='\ufeff';
    const rows=[];

    // ① 고객 정보
    rows.push(['[고객 정보]','','','']);
    rows.push(['고객명', customer.name||'-', '연락처', customer.phone||'-']);
    rows.push(['주소', customer.address||'-','','']);
    rows.push(['면적',
      [customer.pyeong?customer.pyeong+'평(전용)':'', customer.pyeongSupply?customer.pyeongSupply+'평(공급)':''].filter(Boolean).join(' / ')||'-',
      '','']);
    rows.push([]);

    // ② 공종별 내역 (현재 탭 기준)
    const modeLabel=printMode==='simple'?'간략 고객용':printMode==='detail'?'상세 고객용':'내부용';
    rows.push(['[견적 내역 - '+modeLabel+']','','','']);
    rows.push(['공종','상세','금액(원)','']);
    visItems.forEach(function(item){
      rows.push([item.label, (item.details||'').replace(/\n/g,' | '), Math.round(item.amount), '']);
    });
    rows.push([]);

    // ③ 금액 요약
    rows.push(['[금액 요약]','','','']);
    rows.push(['항목 합계','','',Math.round(total)]);
    if(disc>0) rows.push(['할인','','','-'+Math.round(disc)]);
    if(ex>0)   rows.push(['추가금액','','','+'+Math.round(ex)]);
    if(vatOn)  rows.push(['VAT(10%)','','',Math.round(vat)]);
    rows.push(['최종 견적 금액','','',Math.round(final)]);
    rows.push([]);

    // ④ 결제 일정
    rows.push(['[결제 일정]','','','']);
    rows.push(['계약금('+payRatios.contract+'%)','','',payAmts.contract]);
    rows.push(['중도금('+payRatios.middle+'%)','','',payAmts.middle]);
    rows.push(['잔금('+payRatios.balance+'%)','','',payAmts.balance]);

    const csv=rows.map(function(r){
      if(!r||r.length===0)return '';
      return r.map(function(v){return '"'+String(v==null?'':v).replace(/"/g,'""')+'"';}).join(',');
    }).join('\n');

    const blob=new Blob([BOM+csv],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='견적서_'+(customer.name||'고객')+'_'+todayStr()+'.csv';
    a.click();
    URL.revokeObjectURL(a.href);
    if(toast) toast('엑셀(CSV) 저장 완료','success');
  }

  // 카카오 공유
  function handleKakao(){
    setSharing(true);
    var el=ref.current;
    html2canvas(el,{scale:2,backgroundColor:'#ffffff',useCORS:true}).then(function(canvas){
      var url=canvas.toDataURL('image/png');
      var link=document.createElement('a');
      link.download='견적서_'+(customer.name||'고객')+'_'+todayStr()+'.png';
      link.href=url;link.click();
      toast('이미지 저장됨. 카카오톡에서 전송하세요.','success');
      if(navigator.share){
        canvas.toBlob(function(blob){
          var file=new File([blob],'견적서.png',{type:'image/png'});
          if(navigator.canShare&&navigator.canShare({files:[file]})){
            navigator.share({files:[file],title:'인테리어 견적서'}).catch(function(){});
          }
        });
      }
      setSharing(false);
    }).catch(function(){
      toast('이미지 생성 실패','error');
      setSharing(false);
    });
  }

/* ══════════════════ 공사 기간 계산 ══════════════════ */
function calcDuration(sel,opts){
  const breakdown=[];
  if(sel.includes('demolition_disposal')){breakdown.push({label:'철거',days:2});}
  if(sel.includes('bathroom')){
    const cnt=(opts.bathrooms||[]).length;
    breakdown.push({label:'욕실',days:3*cnt});
  }
  if(sel.includes('kitchen')){breakdown.push({label:'주방',days:2});}
  if(sel.includes('flooring')){breakdown.push({label:'바닥',days:2});}
  if(sel.includes('wallpaper')){breakdown.push({label:'도배',days:2});}
  if(sel.includes('lighting')){breakdown.push({label:'조명',days:1});}
  if(sel.includes('middoor')){breakdown.push({label:'중문',days:1});}
  if(sel.includes('film')){breakdown.push({label:'필름',days:1});}
  if(sel.includes('builtin_closet')){breakdown.push({label:'붙박이장',days:1});}
  if(sel.includes('window_sash')){breakdown.push({label:'창호',days:2});}
  if(sel.includes('balcony_extension')){breakdown.push({label:'베란다 확장',days:3});}
  if(sel.includes('electrical_network')){breakdown.push({label:'전기/통신',days:2});}
  const base=breakdown.reduce(function(s,b){return s+b.days;},0);
  const total=base>0?base+2:0;
  return {total,breakdown};
}

function SignatureModal(props){
  var onSave=props.onSave,onClose=props.onClose,existing=props.existing;
  var canvasRef=useRef(null);
  var _drawing=useState(false); var drawing=_drawing[0]; var setDrawing=_drawing[1];
  var _has=useState(false); var hasStrokes=_has[0]; var setHasStrokes=_has[1];
  var _agreed=useState(false); var agreed=_agreed[0]; var setAgreed=_agreed[1];
  var lastPos=useRef(null);

  useEffect(function(){
    var canvas=canvasRef.current;
    if(!canvas)return;
    var ctx=canvas.getContext('2d');
    canvas.width=canvas.offsetWidth*2;
    canvas.height=canvas.offsetHeight*2;
    ctx.scale(2,2);
    ctx.strokeStyle='#0F172A';
    ctx.lineWidth=2.5;
    ctx.lineCap='round';
    ctx.lineJoin='round';
  },[]);

  function getPos(e,canvas){
    var r=canvas.getBoundingClientRect();
    var src=e.touches?e.touches[0]:e;
    return{x:src.clientX-r.left,y:src.clientY-r.top};
  }
  function startDraw(e){
    e.preventDefault();
    lastPos.current=getPos(e,canvasRef.current);
    setDrawing(true);
  }
  function draw(e){
    e.preventDefault();
    if(!drawing)return;
    var canvas=canvasRef.current;
    var ctx=canvas.getContext('2d');
    var pos=getPos(e,canvas);
    ctx.beginPath();
    ctx.moveTo(lastPos.current.x,lastPos.current.y);
    ctx.lineTo(pos.x,pos.y);
    ctx.stroke();
    lastPos.current=pos;
    setHasStrokes(true);
  }
  function endDraw(e){e.preventDefault();setDrawing(false);}
  function clearSig(){
    var canvas=canvasRef.current;
    var ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    setHasStrokes(false);
  }
  function saveSig(){
    if(!hasStrokes&&!existing){alert('서명을 먼저 해주세요.');return;}
    if(!agreed){alert('동의 항목을 체크해주세요.');return;}
    var data=hasStrokes?canvasRef.current.toDataURL('image/png'):existing;
    onSave(data);
    onClose();
  }

  return R('div',{className:'overlay'},
    R('div',{className:'modal',style:{maxWidth:480}},
      R('div',{className:'modal-hd'},
        R('span',{className:'modal-ttl'},'전자서명'),
        R('button',{className:'btn btn-outline btn-sm',onClick:onClose},'닫기')
      ),
      R('div',{className:'modal-body',style:{display:'flex',flexDirection:'column',gap:12}},
        R('p',{style:{fontSize:12,color:'var(--c-muted)'}},'아래 서명란에 서명 후 완료 버튼을 눌러주세요.'),
        R('div',{className:'sig-wrap',style:{height:160}},
          R('canvas',{ref:canvasRef,className:'sig-canvas',style:{height:160},
            onMouseDown:startDraw,onMouseMove:draw,onMouseUp:endDraw,onMouseLeave:endDraw,
            onTouchStart:startDraw,onTouchMove:draw,onTouchEnd:endDraw
          }),
          !hasStrokes&&!existing&&R('div',{className:'sig-ph'},'이곳에 서명하세요')
        ),
        existing&&!hasStrokes&&R('div',{style:{textAlign:'center'}},
          R('p',{style:{fontSize:11,color:'var(--c-muted)',marginBottom:4}},'현재 저장된 서명'),
          R('img',{src:existing,style:{maxHeight:50,border:'1px solid var(--c-border)',borderRadius:'var(--r-sm)',padding:3}})
        ),
        R('label',{style:{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:'var(--c-warn-lt)',border:'1px solid #FDE68A',borderRadius:'var(--r-sm)',cursor:'pointer'}},
          R('input',{type:'checkbox',checked:agreed,onChange:function(e){setAgreed(e.target.checked);}}),
          R('span',{style:{fontSize:12}},'위 견적 내용을 확인하였으며, 전자서명으로 동의합니다.')
        ),
        R('div',{style:{display:'flex',gap:8}},
          R('button',{className:'btn btn-outline',style:{flex:1},onClick:clearSig},'다시 그리기'),
          R('button',{className:'btn btn-gold',style:{flex:1},onClick:saveSig},'서명 완료')
        )
      )
    )
  );
}

                    ),

                  );

        }),
        // 합계

          R('tbody',null,

              R('td',{colSpan:5},R('strong',null,'자재비 합계 (부가세 별도)')),

            )
          )

        R('div',{style:{marginTop:10,padding:'8px 12px',background:'var(--c-warn-lt)',border:'1px solid #FDE68A',borderRadius:'var(--r-sm)',fontSize:10,color:'var(--c-warn)',lineHeight:1.7}},
          '수량은 현장 실측 후 조정될 수 있습니다. 인건비 및 운반비는 별도입니다.'
        )
      )
    )
  );
}


function App(){

  };
  const exportLineItemsCsv=function(){

        ].map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';});

    // ③ 합계

        return '"'+String(v==null?'':v).replace(/"/g,'""')+'"';
      }).join(',');

        ].filter(Boolean);

      }).join('\n─────\n');
      label=`욕실 (${baths.length}개)`;

      amount=calcGrout(o);
      details=({'cement':'시멘트','epoxy':'에폭시','nano':'나노코팅'}[o.type||'cement'])+' / '+(parseFloat(o.sqm)||0)+'㎡';
      label='줄눈';
    } else if(id==='kitchen'){
      amount=calcKit(o);
      const d=[];
      if(o.sinkReplace)d.push('싱크대 교체');

      details=d.join(', ')||'기본 구성';
    } else if(id==='wallpaper'){
      amount=calcWall(o,py);
      details=[{basic:'합지',silk:'실크',premium:'프리미엄'}[o.type]||'합지',o.partial?'부분 도배':'전체 도배',o.ceiling?'천장 포함':''].filter(Boolean).join(' / ');
    } else if(id==='flooring'){

      ].filter(Boolean).join(' / ');
      label='샷시/창호';
    } else if(id==='balcony_extension'){
      amount=calcBalconyExt(o);
      details=[
        `${pn(o.count)||1}개소`,
        {basic:'기본단열',premium:'프리미엄단열'}[o.insulation||'basic'],
        {tile:'타일 마감',wood:'원목마루 마감'}[o.floor||'tile'],

      ].filter(Boolean).join(' / ');
      label='베란다 확장';
    } else if(id==='demolition_disposal'){
      amount=calcDemolition(o,py);
      details=[
        {light:'경량 철거',standard:'표준 철거',heavy:'전면 철거'}[o.level||'standard'],
        py?`${py}평`:'-',
        `폐기물 ${pn(o.wasteTon)||2}톤`,
      ].filter(Boolean).join(' / ');
      label='철거/폐기';
    } else if(id==='electrical_network'){
      amount=calcElectrical(o);
      const d=[];
      if(o.electricBase&&o.electricBase!=='none')d.push({basic:'전기 기본',full:'전기 전면'}[o.electricBase]);
      if(o.network&&o.network!=='none')d.push({basic:'통신 기본',premium:'통신 프리미엄'}[o.network]);
      if(o.panel)d.push('분전반 교체');
      if(pn(o.outletQty)>0)d.push(`콘센트 ${o.outletQty}개`);
      if(o.evCharger)d.push('EV 충전');
      details=d.join(', ')||'미선택';
      label='전기/통신';
    } else if(id==='others'){amount=calcOthers(o);label='기타 공사';}
    return {id,label,amount,details};
  }),[sel,opts,py,lineItemsByType]);

  const total=subtotals.reduce((s,i)=>s+i.amount,0);
  const disc=pn(adj.discount),ex=pn(adj.extra),mar=pn(adj.margin);
  // 추가공사/감액 반영
  const changeTotal=(changeItems||[]).reduce((s,ci)=>{
    const amt=pn(ci.amount);
    return s+(ci.type==='감액'?-amt:amt);
  },0);
  const afterDisc=total-disc+ex+changeTotal;
  const finalBase=afterDisc*(1+mar/100);
  const vat=vatOn?finalBase*0.1:0;
  const final=Math.max(0,finalBase+vat);

  /* 저장 */
  /* ── 검수 경고 ── */
  const runValidation=()=>{
    const warns=[];
    const pr=pn(payRatios.contract)+pn(payRatios.middle)+pn(payRatios.balance);
    if(pr>0&&pr!==100) warns.push('⚠ 결제 비율 합계가 '+pr+'%입니다 (100%여야 합니다)');
    if(disc>0&&disc>total*0.5) warns.push('⚠ 할인액이 합계의 50%를 초과합니다');
    if(sel.includes('demolition_disposal')&&!opts.demolition_disposal?.wasteTon) warns.push('⚠ 철거/폐기 선택 시 폐기물 처리 비용을 확인하세요');
    if(sel.includes('bathroom')&&(opts.bathrooms||[]).reduce((s,b)=>s+calcBath(b.opt),0)<500000) warns.push('⚠ 욕실 견적이 비정상적으로 낮습니다');
    return warns;
  };

  /* ── 저장 데이터 패키징 ── */
  const packData=(baseId,ver,logMemo)=>{
    const logEntry={savedAt:new Date().toISOString(),version:ver,finalAmount:Math.round(final),status:estStatus,memo:logMemo||''};
    const nextLog=[logEntry,...(changeLog||[])].slice(0,30);
    return {
      id:baseId, version:ver,
      customer:cust,
      selectedTypes:sel,
      options:opts,
      adj,
      changeItems,
      vatOn,
      payRatios,
      hiddenItems,
      refSel,
      refNotes,
      signature,
      sigSigned,
      mainItemsByType,
      lineItemsByType,
      calendarLogs,
      photos,
      estStatus,
      changeLog:nextLog,
      finalAmount:Math.round(final),
      savedAt:new Date().toISOString(),
    };
  };

  /* 저장 */
  const save=(logMemo)=>{
    const warns=runValidation();
    if(warns.length>0){
      const ok=confirm('저장 전 확인:\n\n'+warns.join('\n')+'\n\n계속 저장할까요?');
      if(!ok)return;
    }
    const baseId=editId||genId();
    const newVer=editId?editVersion:1;
    const data=packData(baseId,newVer,logMemo);
    data.changeLog=[{savedAt:new Date().toISOString(),version:newVer,finalAmount:Math.round(final),status:estStatus,memo:logMemo||''},...changeLog].slice(0,30);
    try{
      const prev=JSON.parse(localStorage.getItem('interior_estimates')||'[]');
      const next=editId?prev.map(i=>i.id===editId?data:i):[data,...prev];
      localStorage.setItem('interior_estimates',JSON.stringify(next));
      setEditId(baseId); setEditVersion(newVer);
      setChangeLog(data.changeLog);
      toast('견적이 저장되었습니다 ✓','success');
    }catch(e){ toast('저장에 실패했습니다: '+e.message,'error'); }
  };

  /* 새 버전으로 저장 */
  const saveNewVersion=(logMemo)=>{
    if(!editId){save(logMemo);return;}
    const warns=runValidation();
    if(warns.length>0){
      const ok=confirm('저장 전 확인:\n\n'+warns.join('\n')+'\n\n계속 저장할까요?');
      if(!ok)return;
    }
    const newVer=editVersion+1;
    const newId=genId();
    const newLog=[{savedAt:new Date().toISOString(),version:newVer,finalAmount:Math.round(final),status:estStatus,memo:logMemo||''},...changeLog].slice(0,30);
    const data={...packData(newId,newVer,logMemo),changeLog:newLog};
    try{
      const prev=JSON.parse(localStorage.getItem('interior_estimates')||'[]');
      localStorage.setItem('interior_estimates',JSON.stringify([data,...prev]));
      setEditId(newId); setEditVersion(newVer); setChangeLog(newLog);
      toast('v'+newVer+'로 새 버전 저장 완료 ✓','success');
    }catch{ toast('저장 실패','error'); }
  };

  /* 빠른 저장 (메모 없이) */
  const quickSave=()=>save('');

  /* 불러오기 */
  const load=data=>{
    const c={
      name:'',phone:'',address:'',pyeong:'',pyeongSupply:'',
      aptType:'',moveInDate:'',consultDate:'',
      memo:'',memoInternal:'',memoCustomer:'',memoSite:'',
      ...(data.customer||{})
    };
    // 하위호환: 기존 memo → memoInternal로 마이그레이션
    if(c.memo&&!c.memoInternal) c.memoInternal=c.memo;
    setCust(c);
    setSel(data.selectedTypes||[]);
    const merged={...IO,...(data.options||{})};
    if(!merged.bathrooms)merged.bathrooms=[{id:'master',label:'안방욕실',opt:{...IB}}];
    setOpts(merged);
    setAdj(data.adj||{discount:'',extra:'',margin:''});
    setChangeItems(data.changeItems||[]);
    setVatOn(data.vatOn||false);
    setPayRatios(data.payRatios||{contract:30,middle:50,balance:20});
    setHiddenItems(data.hiddenItems||[]);
    setRefSel(data.refSel||[]);
    setRefNotes(data.refNotes||{});
    setSignature(data.signature||null);
    setSigSigned(data.sigSigned||false);
    setMainItemsByType(data.mainItemsByType||{});
    setLineItemsByType(data.lineItemsByType||{});
    setCalendarLogs((data.calendarLogs||[]).map(function(l){
      return {...createCalLog(),...l,tasks:(l.tasks||[]).length?l.tasks:[createTaskRow()]};
    }));
    setPhotos(data.photos||[]);
    setEstStatus(data.estStatus||'상담중');
    setChangeLog(data.changeLog||[]);
    setEditId(data.id); setEditVersion(data.version||1);
    const o={};(data.selectedTypes||[]).forEach(id=>{o[id]=true;});setOpens(o);
    toast('견적을 불러왔습니다','info');
  };

  /* 템플릿 적용 */
  const applyTmpl=t=>{
    if(t.pyeong)setCust(c=>({...c,pyeong:t.pyeong}));
    setSel(t.selectedTypes||[]);
    const merged={...IO,...t.opts};
    if(!merged.bathrooms)merged.bathrooms=[{id:'master',label:'안방욕실',opt:{...IB}}];

    setLineItemsByType({});

  const reset=()=>{
    if(!confirm('모든 입력을 초기화할까요?'))return;
    setCust({name:'',phone:'',address:'',pyeong:'',pyeongSupply:'',aptType:'',moveInDate:'',consultDate:'',memo:'',memoInternal:'',memoCustomer:'',memoSite:''});

    setHiddenItems([]); setRefSel([]); setRefNotes({});
    setSignature(null); setSigSigned(false);
    setEstStatus('상담중'); setChangeLog([]);
    setPhotos([]);

  };

    setCust(function(c){

      setOpts(function(o){return {...o,bathrooms:newBaths};});

  // 공사 기간 계산
  var duration=useMemo(function(){return calcDuration(sel,opts);},[sel,opts]);

  // 전자서명 저장
  function handleSigSave(data){
    setSignature(data);
    setSigSigned(true);

  const renderSec=id=>{

    if(id==='grout')    return R(GroutSection,{key:id,opt:opts.grout||{type:'cement',sqm:'',extra:''},onChange:v=>setOpt('grout',v),open,onToggle:tog});
    if(id==='bathroom') return R(BathSection,{key:id,bathrooms:opts.bathrooms,onChange:v=>setOpt('bathrooms',v),open,onToggle:tog});
    if(id==='kitchen')  return R(KitSection,{key:id,opt:opts.kitchen,onChange:v=>setOpt('kitchen',v),open,onToggle:tog});
    if(id==='wallpaper')return R(WallSection,{key:id,opt:opts.wallpaper,onChange:v=>setOpt('wallpaper',v),py,open,onToggle:tog});
    if(id==='flooring') return R(FloorSection,{key:id,opt:opts.flooring,onChange:v=>setOpt('flooring',v),py,open,onToggle:tog});
    if(id==='middoor')  return R(DoorSection,{key:id,opt:opts.middoor,onChange:v=>setOpt('middoor',v),open,onToggle:tog});
    if(id==='lighting') return R(LightSection,{key:id,opt:opts.lighting,onChange:v=>setOpt('lighting',v),open,onToggle:tog});
    if(id==='film')     return R(FilmSection,{key:id,opt:opts.film,onChange:v=>setOpt('film',v),open,onToggle:tog});
    if(id==='builtin_closet')return R(ClosetSection,{key:id,opt:opts.builtin_closet,onChange:v=>setOpt('builtin_closet',v),open,onToggle:tog});

    if(id==='window_sash')      return R(WindowSashSection,{key:id,opt:opts.window_sash,onChange:v=>setOpt('window_sash',v),open,onToggle:tog});
    if(id==='balcony_extension')return R(BalconyExtSection,{key:id,opt:opts.balcony_extension,onChange:v=>setOpt('balcony_extension',v),open,onToggle:tog});
    if(id==='demolition_disposal')return R(DemolitionSection,{key:id,opt:opts.demolition_disposal,onChange:v=>setOpt('demolition_disposal',v),py,open,onToggle:tog});
    if(id==='electrical_network')return R(ElectricalSection,{key:id,opt:opts.electrical_network,onChange:v=>setOpt('electrical_network',v),open,onToggle:tog});
    if(id==='others')   return R(OtherSection,{key:id,others:opts.others,onChange:v=>setOpt('others',v),open,onToggle:tog});
  };
  const renderLineEditor=function(typeId){
    const pt=PTYPES.find(function(p){return p.id===typeId;});
    const rows=lineItemsByType[typeId]||[];
    const mainPool=MAIN_ITEM_DB[typeId]||[];
    const mainId=mainItemsByType[typeId]||'';
    const subTotal=rows.reduce(function(s,r){return s+lineTotal(r);},0);
    return R('div',{key:'line-'+typeId,className:'line-box'},
      R('div',{className:'line-hd'},
        R('strong',null,(pt&&pt.label)||typeId+' 라인아이템'),
        R('div',{className:'line-ctl'},
          mainPool.length>0&&R('select',{className:'finput',style:{minWidth:170,height:32,padding:'0 8px'},value:mainId,onChange:function(e){setMainItem(typeId,e.target.value);}},
            R('option',{value:''},'메인 품목 선택'),
            mainPool.map(function(m){return R('option',{key:m.id,value:m.id},m.label);})
          ),
          mainPool.length>0&&R('button',{className:'btn btn-outline btn-sm',type:'button',onClick:function(){if(!mainId)return;applyMainTemplate(typeId,mainId);}},'부자재 자동입력'),
          R('button',{className:'btn btn-outline btn-sm',type:'button',onClick:function(){addManualRow(typeId);}},'행 추가')
        )
      ),
      rows.length===0
        ?R('div',{style:{padding:12,fontSize:11,color:'var(--c-muted)'}},'라인아이템이 없습니다. 메인 품목을 선택해 자동 입력하거나 행 추가로 직접 작성하세요.')
        :R('div',{style:{overflowX:'auto'}},
            R('table',{className:'line-table'},
              R('thead',null,R('tr',null,
                R('th',null,'품목명'),
                R('th',null,'규격'),
                R('th',null,'수량'),
                R('th',null,'단위'),
                R('th',null,'자재'),
                R('th',null,'노무'),
                R('th',null,'경비'),
                R('th',null,'직접금액'),
                R('th',null,'합계'),
                R('th',null,'')
              )),
              R('tbody',null,
                rows.map(function(r){
                  return R('tr',{key:r.rowId},
                    R('td',null,R('input',{className:'line-in',value:r.name,onChange:function(e){updateRowCell(typeId,r.rowId,'name',e.target.value);}})),

                    R('td',null,R('input',{type:'number',min:0,className:'line-in num',value:pn(r.qty),onChange:function(e){updateRowCell(typeId,r.rowId,'qty',pn(e.target.value));}})),
                    R('td',null,R('input',{className:'line-in',style:{width:56},value:r.unit,onChange:function(e){updateRowCell(typeId,r.rowId,'unit',e.target.value);}})),
                    R('td',null,R('input',{type:'number',min:0,className:'line-in num',value:pn(r.material),onChange:function(e){updateRowCell(typeId,r.rowId,'material',pn(e.target.value));}})),
                    R('td',null,R('input',{type:'number',min:0,className:'line-in num',value:pn(r.labor),onChange:function(e){updateRowCell(typeId,r.rowId,'labor',pn(e.target.value));}})),
                    R('td',null,R('input',{type:'number',min:0,className:'line-in num',value:pn(r.expense),onChange:function(e){updateRowCell(typeId,r.rowId,'expense',pn(e.target.value));}})),
                    R('td',null,
                      R('label',{style:{display:'flex',alignItems:'center',gap:4,fontSize:10,color:'var(--c-muted)'}},
                        R('input',{type:'checkbox',checked:!!r.directMode,onChange:function(e){updateRowCell(typeId,r.rowId,'directMode',e.target.checked);}}),
                        '직접'
                      ),
                      r.directMode&&R('input',{type:'number',min:0,className:'line-in num',style:{marginTop:4},value:pn(r.directAmount),onChange:function(e){updateRowCell(typeId,r.rowId,'directAmount',pn(e.target.value));}})
                    ),
                    R('td',{style:{fontWeight:700,textAlign:'right',whiteSpace:'nowrap'}},fmt(lineTotal(r))),
                    R('td',null,
                      R('div',{style:{display:'flex',gap:4}},
                        R('button',{className:'btn btn-outline btn-sm',type:'button',onClick:function(){dupRow(typeId,r.rowId);}},'복제'),
                        R('button',{className:'btn btn-outline btn-sm',type:'button',onClick:function(){removeRow(typeId,r.rowId);}},'삭제')
                      )

              R('span',null,'라인아이템 소계'),
              R('span',null,fmt(subTotal))
            )
          )
    );
  };

  return R('div',null,
    /* ─── Toast ─── */
    R('div',{className:'toast-wrap no-print'},
      toasts.map(t=>R('div',{key:t.id,className:`toast ${t.type}`},
        {success:'✓',error:'✕',info:'ℹ',warn:'⚠'}[t.type]||'', t.msg
      ))
    ),

    /* ─── Nav ─── */
    R('nav',{className:'nav no-print'},
      R('div',{className:'nav-logo'},
        R('div',{className:'nav-logo-mark'},'🏠'),'서진인테리어 ',R('span',{className:'badge badge-ver',style:{fontSize:8,verticalAlign:'middle',marginLeft:4}},'v9')
      ),
      R('div',{className:'nav-tabs'},
        R('button',{className:`ntab ${page==='estimate'?'on':''}`,onClick:()=>setPage('estimate')},'견적 작성'),
        R('button',{className:`ntab ${page==='dashboard'?'on':''}`,onClick:()=>setPage('dashboard')},'통계')
      ),
      R('div',{className:'nav-right'},
        editId&&R('span',{className:'badge badge-gold',style:{fontSize:9}},
          'v'+(editVersion||1)+' · '+editId.slice(-8)
        ),
        R('button',{className:'btn btn-ghost',style:{fontSize:11},onClick:()=>setModal('company')},
          '🏢',R('span',{className:'txt'},' 업체설정')),
        R('button',{className:'btn btn-ghost',style:{fontSize:11},onClick:()=>setModal('template')},
          '📋',R('span',{className:'txt'},' 템플릿')),
        R('button',{className:'btn btn-ghost',style:{fontSize:11},onClick:()=>setModal('saved')},
          '📁',R('span',{className:'txt'},' 불러오기')),
        R('button',{className:'btn btn-ghost',style:{fontSize:11},onClick:function(){setModal('priceEditor');}},
          '💰',R('span',{className:'txt'},' 단가')),
        R('button',{className:'btn btn-ghost',style:{fontSize:11},onClick:function(){setModal('changeLog');}},
          '📜',R('span',{className:'txt'},' 이력')),

          '📌',R('span',{className:'txt'},' 새버전')),
        R('button',{className:'btn btn-ghost',style:{fontSize:11,color:'#f9b9b5'},onClick:reset},
          '↺',R('span',{className:'txt'},' 초기화')),
      )
    ),

    /* ─── 견적 작성 페이지 ─── */
    page==='estimate'&&R('div',{className:'workspace'},

      /* 왼쪽 */
      R('div',{className:'main-col'},

        /* 고객 정보 */
        R('div',{className:'card'},
          R('div',{className:'card-hd'},
            R('span',{className:'card-label'},R('span',{className:'ico'},'👤'),'고객 정보'),
            R('div',{style:{display:'flex',gap:6,alignItems:'center'}},
              // 견적 상태 선택
              R('select',{
                className:'finput',
                style:{height:30,padding:'0 8px',fontSize:12,fontWeight:700,
                  color:{상담중:'#3B82F6',견적발송:'#F59E0B',계약완료:'#10B981',시공중:'#8B5CF6',완료:'#64748B',보류:'#94A3B8',취소:'#EF4444'}[estStatus]||'#0F172A',
                  borderColor:{상담중:'#3B82F6',견적발송:'#F59E0B',계약완료:'#10B981',시공중:'#8B5CF6',완료:'#64748B',보류:'#94A3B8',취소:'#EF4444'}[estStatus]||'#CBD5E1',
                  width:100,borderRadius:6},
                value:estStatus,
                onChange:e=>setEstStatus(e.target.value)
              },
                ['상담중','견적발송','계약완료','시공중','완료','보류','취소'].map(s=>R('option',{key:s,value:s},s))
              ),

            )

          cust.aptName&&R('div',{style:{padding:'0 20px 0'}},
            R('div',{className:'apt-badge'},'아파트: '+cust.aptName+(cust.aptSize?' '+cust.aptSize+' 타입':''))
          ),
          R('div',{className:'card-body'},
            R('div',{className:'fg2'},
              R('div',{className:'fg'},R('label',{className:'flabel'},'고객명'),R('input',{type:'text',className:'finput',value:cust.name,placeholder:'홍길동',onChange:e=>setCust(c=>({...c,name:e.target.value}))})),
              R('div',{className:'fg'},R('label',{className:'flabel'},'연락처'),R('input',{type:'tel',className:'finput',value:cust.phone,placeholder:'010-0000-0000',onChange:e=>setCust(c=>({...c,phone:e.target.value}))})),
              R('div',{className:'fg full'},R('label',{className:'flabel'},'현장 주소'),R('input',{type:'text',className:'finput',value:cust.address,placeholder:'서울시 강남구 역삼동',onChange:e=>setCust(c=>({...c,address:e.target.value}))})),
              R('div',{className:'fg'},

              photos.length>0&&R('span',{className:'badge badge-navy'},photos.length+'장'),
              R('label',{className:'btn btn-outline btn-sm',style:{cursor:'pointer',marginBottom:0}},
                '사진 추가',
                R('input',{type:'file',accept:'image/*',multiple:true,style:{display:'none'},
                  onChange:function(e){
                    const files=Array.from(e.target.files);
                    if(photos.length+files.length>10){toast('사진은 최대 10장까지 첨부 가능합니다.','warn');return;}
                    files.forEach(function(file){
                      if(file.size>2*1024*1024){toast(file.name+' 파일이 2MB를 초과합니다.','warn');return;}
                      const reader=new FileReader();
                      reader.onload=function(ev){
                        setPhotos(function(prev){return [...prev,{id:genId(),name:file.name,data:ev.target.result,includeInPrint:false}];});
                      };
                      reader.readAsDataURL(file);
                    });
                    e.target.value='';
                  }
                })
              )
            )
          ),
          R('div',{className:'card-body'},
            photos.length===0
              ?R('p',{style:{fontSize:12,color:'var(--c-muted)'}},'현장 사진을 첨부하면 내부 확인 시 활용할 수 있습니다. (최대 10장, 장당 2MB)')
              :R('div',{style:{display:'flex',flexWrap:'wrap',gap:10}},
                  photos.map(function(ph){
                    return R('div',{key:ph.id,style:{position:'relative',width:90,borderRadius:'var(--r-md)',overflow:'hidden',border:'1px solid var(--c-border)'}},
                      R('img',{src:ph.data,style:{width:90,height:70,objectFit:'cover',display:'block'}}),
                      R('div',{style:{padding:'4px 6px',background:'var(--c-surface2)',fontSize:9,color:'var(--c-muted)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},ph.name),
                      R('button',{style:{position:'absolute',top:2,right:2,background:'rgba(0,0,0,.55)',border:'none',color:'#fff',borderRadius:'50%',width:18,height:18,fontSize:10,cursor:'pointer',lineHeight:'18px',padding:0},
                        onClick:function(){setPhotos(function(p){return p.filter(function(x){return x.id!==ph.id;});});}
                      },'✕')
                    );
                  })
                )
          )
        ),

        /* 버튼 */
        R('div',{style:{display:'flex',gap:8,paddingBottom:16}},
          R('button',{className:'btn btn-gold',style:{flex:1},onClick:function(){setModal('simple');}},'간략 견적서'),
          R('button',{className:'btn btn-outline',style:{flex:1},onClick:function(){setModal('detail');}},'상세 견적서'),
          R('button',{className:'btn btn-navy',style:{flex:1},onClick:function(){setModal('internal');}},'내부용'),
          R('button',{className:'btn btn-outline',style:{flex:1},onClick:function(){setModal('purchase_order');}},'발주서'),
        )
      ),

      /* 오른쪽 요약 */
      R('div',{className:'side-col no-print'},
        R('div',{className:'sum-ttl'},'실시간 견적 요약'),

        cust.name&&R('div',{style:{padding:'7px 0',borderBottom:'1px solid var(--c-border)',marginBottom:8}},
          R('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
            R('div',{style:{fontWeight:800,fontSize:14,color:'var(--c-navy)'}},cust.name),
            R('span',{style:{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:99,
              background:{상담중:'#EFF6FF',견적발송:'#FFFBEB',계약완료:'#ECFDF5',시공중:'#F5F3FF',완료:'#F1F5F9',보류:'#F8FAFC',취소:'#FEF2F2'}[estStatus]||'#F1F5F9',
              color:{상담중:'#3B82F6',견적발송:'#F59E0B',계약완료:'#10B981',시공중:'#8B5CF6',완료:'#64748B',보류:'#94A3B8',취소:'#EF4444'}[estStatus]||'#64748B'}},estStatus)
          ),
          cust.address&&R('div',{style:{fontSize:11,color:'var(--c-muted)'}},'📍 '+cust.address),
          (cust.pyeong||cust.pyeongSupply)&&R('div',{style:{fontSize:11,color:'var(--c-muted)'}},'📐 '+[cust.pyeong?cust.pyeong+'평(전용)':'',cust.pyeongSupply?cust.pyeongSupply+'평(공급)':''].filter(Boolean).join(' / ')),
        ),

        R('div',{className:'sec-head'},'항목별 금액'),
        subtotals.length===0
          ?R('div',{className:'sum-empty'},'공사 항목을 선택하면\n금액이 표시됩니다.')
          :subtotals.map(item=>R('div',{key:item.id,className:'sum-item'},
              R('span',{className:'sim-name'},PTYPES.find(p=>p.id===item.id)?.e,' ',item.label),
              R('span',{className:'sim-amt'},fmt(item.amount))
            )),

        R('div',{className:'divider'}),
        disc>0&&R('div',{className:'sum-item'},R('span',{style:{color:'var(--c-danger)'}},'할인'),R('span',{style:{color:'var(--c-danger)',fontWeight:700}},'− '+fmt(disc))),
        ex>0&&R('div',{className:'sum-item'},R('span',null,'추가'),R('span',{className:'sim-amt'},'+ '+fmt(ex))),
        changeTotal!==0&&R('div',{className:'sum-item'},
          R('span',{style:{color:changeTotal>=0?'var(--c-success)':'var(--c-danger)'}},'추가공사/감액'),
          R('span',{style:{color:changeTotal>=0?'var(--c-success)':'var(--c-danger)',fontWeight:700}},(changeTotal>=0?'+ ':'-')+fmt(Math.abs(changeTotal)))
        ),
        mar>0&&R('div',{className:'sum-item'},R('span',null,'마진'),R('span',{className:'sim-amt'},fmt(finalBase-afterDisc))),
        vatOn&&R('div',{className:'sum-item'},R('span',null,'VAT'),R('span',{className:'sim-amt'},fmt(vat))),

        R('div',{className:'total-box'},
          R('div',{className:'tlbl'},'최종 견적 금액'),
          R('div',{className:'tamt'},fmt(final)),
          R('div',{className:'tsub'},
            total>0&&R('span',null,'합계: '+fmt(total)),
            disc>0&&R('span',null,'할인: − '+fmt(disc)),
            vatOn&&R('span',null,'VAT 포함')
          )
        ),

        R('div',{style:{display:'flex',flexDirection:'column',gap:6,marginTop:4}},
          R('button',{className:'btn btn-gold btn-full',onClick:function(){setModal('simple');}},'간략 견적서'),
          R('button',{className:'btn btn-outline btn-full',onClick:function(){setModal('detail');}},'상세 견적서'),
          R('button',{className:'btn btn-navy btn-full',onClick:function(){setModal('internal');}},'내부용 견적서'),
          R('button',{className:'btn btn-kakao btn-full',onClick:function(){setModal('simple');}},'카카오톡 공유'),
          R('button',{className:'btn btn-outline btn-full',onClick:exportEstimateCsv},'📊 견적서 엑셀 저장'),
          R('button',{className:'btn btn-outline btn-full',onClick:quickSave},'💾 저장'),
          editId&&R('button',{className:'btn btn-outline btn-full',onClick:function(){setModal('saveNewVer');}},'📌 새 버전으로 저장'),
        ),
        // 공사기간 요약
        duration.total>0&&R('div',null,
          R('div',{className:'divider'}),
          R('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0'}},
            R('span',{style:{fontSize:11,fontWeight:700,color:'var(--c-navy)'}},'예상 공사 기간'),
            R('span',{style:{fontSize:18,fontWeight:800,color:'var(--c-info)'}},duration.total+'일')
          )
        ),
        // 서명 상태
        R('div',null,
          R('div',{className:'divider'}),
          R('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0'}},
            R('span',{style:{fontSize:11,fontWeight:700,color:'var(--c-navy)'}},'전자서명'),
            sigSigned
              ?R('span',{className:'sig-done'},'완료')
              :R('button',{className:'btn btn-outline btn-sm',onClick:function(){setModal('signature');}},'서명받기')
          )
        )
      )
    ),

    /* ─── 대시보드 ─── */
    page==='dashboard'&&R(Dashboard,null),

    /* ─── 모달 ─── */
    (modal==='simple'||modal==='detail'||modal==='internal')&&R(PrintModal,{
      customer:cust, subtotals, adj,
      company:co, opts:opts, py:py,
      mode:modal, vatOn, payRatios, hiddenItems, refSel, refNotes, signature:signature, sigSigned:sigSigned,
      lineItemsByType:lineItemsByType,
      changeItems:changeItems,
      onClose:()=>setModal(null), toast
    }),
    modal==='saved'&&R(SavedModal,{onLoad:load,onClose:()=>setModal(null)}),
    modal==='template'&&R(TmplModal,{onApply:applyTmpl,onClose:()=>setModal(null)}),

    modal==='company'&&R(CompanyModal,{co,setCo,onClose:()=>setModal(null),toast}),
    modal==='aptdb'&&R(AptDBModal,{onSelect:applyAptInfo,onClose:function(){setModal(null);},toast:toast}),
    modal==='signature'&&R(SignatureModal,{onSave:handleSigSave,onClose:function(){setModal(null);},existing:signature}),
    modal==='purchase_order'&&R(PurchaseOrderModal,{customer:cust,selTypes:sel,opts:opts,py:py,company:co,onClose:function(){setModal(null);}}),

    /* 단가 관리 모달 */
    modal==='priceEditor'&&R(PriceEditorModal,{onClose:function(){setModal(null);},toast:toast}),

    /* 변경 이력 모달 */
    modal==='changeLog'&&R(ChangeLogModal,{log:changeLog,onClose:function(){setModal(null);}}),

    /* 새 버전 저장 메모 모달 */
    modal==='saveNewVer'&&R(SaveWithMemoModal,{
      title:'새 버전으로 저장',
      onSave:function(memo){saveNewVersion(memo);setModal(null);},
      onClose:function(){setModal(null);}
    }),

    /* ─── 모바일 하단 고정 바 ─── */
    page==='estimate'&&R('div',{className:'mob-bar no-print'},
      R('div',{className:'mob-bar-amt'},
        R('div',{className:'mob-bar-lbl'},'최종 견적'),
        R('div',{className:'mob-bar-val'},fmt(final))
      ),
      R('div',{className:'mob-bar-btns'},
        R('button',{className:'btn btn-gold btn-sm',onClick:function(){setModal('simple');}},'견적서'),
        R('button',{className:'btn btn-kakao btn-sm',onClick:()=>setModal('customer')},'💬 공유'),
        R('button',{className:'btn btn-outline btn-sm',style:{color:'#fff',borderColor:'rgba(255,255,255,.3)'},onClick:save},'💾'),
      )
    )
  );
}

try{
  ReactDOM.createRoot(document.getElementById('root')).render(R(App));
}catch(e){
  bootError('스크립트 실행 중 오류가 발생했습니다: '+(e&&e.message?e.message:'알 수 없는 오류'));
}
}

(async function bootstrap(){
  bootLoading('라이브러리 로딩 중입니다...');
  try{
    await loadFirst([
      'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',
      'https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js',
      'https://unpkg.com/react@18.2.0/umd/react.production.min.js'
    ],'React');
    await loadFirst([
      'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',
      'https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js',
      'https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js'
    ],'ReactDOM');
    try{
      await loadFirst([
        'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js',
        'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js'
      ],'html2canvas');
    }catch(e){
      // html2canvas가 없어도 기본 기능은 동작하게 둔다.
      console.warn(e.message);
    }
    if(typeof React==='undefined' || typeof ReactDOM==='undefined'){
      throw new Error('React 또는 ReactDOM 전역 객체를 찾을 수 없습니다.');
    }
    startApp();
  }catch(e){
    bootError('필수 라이브러리를 불러오지 못했습니다.\n'+(e&&e.message?e.message:String(e)));
  }
})();
</script>
</body>
</html>
